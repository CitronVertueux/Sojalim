<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mon espace — Sojalim RDV</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a3a2a"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<header class="hdr">
  <div class="hdr__logo">
    <div style="background:white;border-radius:8px;padding:.35rem .7rem;border:1px solid var(--border)">
      <img src="logo.png" alt="Sojalim" style="height:36px;object-fit:contain;display:block"/>
    </div>
  </div>
  <div class="hdr__nav">
    <span id="hdr-role" class="hdr__role"></span>
    <span style="color:var(--sub);font-size:.83rem" id="hdr-hello">Bonjour <strong id="uname" style="color:var(--green)"></strong></span>
    <button class="hdr__btn" onclick="toggleLang()" id="lang-toggle">🇪🇸</button>
    <button class="hdr__btn" onclick="Auth.logout()" id="btn-logout">🔒 Déconnexion</button>
  </div>
</header>

<div id="penalty-banner"></div>

<div style="max-width:1000px;margin:1.5rem auto;padding:0 1.5rem 4rem">
  <div class="tab-nav" id="tab-nav">
    <button class="tab-nav__btn on" onclick="showTab('home')"    id="tn-home">🏠 <span id="t-home">Accueil</span></button>
    <button class="tab-nav__btn"   onclick="showTab('new')"     id="tn-new">✚ <span id="t-new">Nouveau RDV</span></button>
    <button class="tab-nav__btn"   onclick="showTab('hist')"    id="tn-hist">📋 <span id="t-hist">Mes RDV</span></button>
    <button class="tab-nav__btn"   onclick="showTab('drivers')" id="tn-drivers" style="display:none">👥 <span id="t-drivers">Mes Chauffeurs</span></button>
    <button class="tab-nav__btn"   onclick="showTab('prof')"    id="tn-prof">👤 <span id="t-prof">Mon Profil</span></button>
  </div>
  <div id="tab-home"    class="fade"></div>
  <div id="tab-new"     style="display:none"></div>
  <div id="tab-hist"    style="display:none"></div>
  <div id="tab-drivers" style="display:none"></div>
  <div id="tab-prof"    style="display:none"></div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/email.js"></script>
<script src="js/rdv.js"></script>

// ── INIT ──────────────────────────────────────────────
let _u=null,_appts=[],_cl=[],_sett={maxTrucks:20},_drivers=[],_score=null;
let _step=1,_date='',_slot='',_hf='upcoming',_activeTab='home';

async function init(){
  _u=Auth.require(['transporter','driver']);
  if(!_u)return;
  applyLang();
  document.getElementById('uname').textContent=_u.first_name;
  const roleKey='role-'+_u.role;
  document.getElementById('hdr-role').textContent=T(roleKey);
  if(_u.role==='transporter') document.getElementById('tn-drivers').style.display='';

  const[appts,cl,sett,score]=await Promise.all([
    (_u.role==='transporter'?RDV.getTransporterAppts(_u.id):RDV.getUserAppts(_u.id)).catch(()=>[]),
    RDV.getClosures().catch(()=>[]),
    RDV.getSettings().catch(()=>({maxTrucks:20})),
    RDV.getUserScore(_u.id).catch(()=>null),
  ]);
  _appts=appts;_cl=cl;_sett=sett;_score=score;

  if(_u.role==='transporter'){
    _drivers=await SB.select('users',{parent_id:`eq.${_u.id}`,role:'eq.driver',select:'id,email,first_name,last_name,phone,status,created_at'}).catch(()=>[]);
  }
  renderPenaltyBanner();
  showTab('home');
}

function applyLang(){
  document.documentElement.lang=LANG;
  // Boutons header
  const lo=document.getElementById('btn-logout');if(lo)lo.textContent=T('btn-logout');
  const lt=document.getElementById('lang-toggle');if(lt)lt.textContent=T('lang-toggle');
  // Tabs
  ['home','new','hist','drivers','prof'].forEach(k=>{
    const el=document.getElementById('t-'+k);if(el)el.textContent=T('t-'+k);
  });
}

function showTab(tab){
  _activeTab=tab;
  ['home','new','hist','drivers','prof'].forEach(t=>{
    const el=document.getElementById('tab-'+t);if(el)el.style.display=t===tab?'block':'none';
    const btn=document.getElementById('tn-'+t);if(btn)btn.classList.toggle('on',t===tab);
  });
  const renders={home:renderHome,new:renderNew,hist:renderHist,drivers:renderDrivers,prof:renderProf};
  if(renders[tab])renders[tab]();
}

// ── BANNER PÉNALITÉ ───────────────────────────────────
function renderPenaltyBanner(){
  if(!_score||_score.alert_level==='ok')return;
  const isDanger=_score.alert_level==='danger';
  document.getElementById('penalty-banner').innerHTML=`
    <div style="max-width:1000px;margin:.5rem auto;padding:0 1.5rem">
      <div class="penalty-banner ${_score.alert_level}">
        <div style="font-size:1.8rem">${isDanger?'🔴':'🟠'}</div>
        <div style="flex:1">
          <div style="font-weight:700;color:${isDanger?'var(--red)':'var(--orange)'};font-size:.95rem">${T(isDanger?'pen-danger-title':'pen-warn-title')}</div>
          <div style="font-size:.85rem;color:var(--sub);margin-top:.2rem">
            ${T('pen-score')} <strong>${_score.total_penalty} pt</strong> · 
            ${T('pen-noshow')} ${_score.no_shows} · 
            ${T('pen-late')} ${_score.lates} · 
            ${T('pen-partial')} ${_score.partial_loads}
          </div>
          <div style="font-size:.82rem;color:var(--sub);margin-top:.2rem">${T(isDanger?'pen-danger-msg':'pen-warn-msg')}</div>
        </div>
        <a href="tel:0562960000" class="btn btn--sm" style="background:${isDanger?'var(--red)':'var(--orange)'};color:white;flex-shrink:0">${T('pen-contact')}</a>
      </div>
    </div>`;
}

// ── ACCUEIL ───────────────────────────────────────────
function renderHome(){
  const c=document.getElementById('tab-home'),now=todayStr();
  const upcoming=_appts.filter(a=>a.date>=now&&a.status==='confirmed').sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot));
  const nextRdv=upcoming[0]||null;
  const thisMonth=_appts.filter(a=>a.status==='confirmed'&&a.date?.startsWith(now.slice(0,7)));
  const totalTonn=thisMonth.reduce((s,a)=>s+parseFloat(a.tonnage||0),0);
  const waitlist=_appts.filter(a=>a.status==='waitlist'&&a.date>=now);
  c.innerHTML=`
    ${nextRdv?`
    <div class="next-rdv">
      <div>
        <div class="next-rdv__label">${T('next-rdv-label')}</div>
        <div class="next-rdv__date">${fmtDate(nextRdv.date)}</div>
        <div class="next-rdv__info">${nextRdv.slot} – ${addMins(nextRdv.slot,30)} · ${nextRdv.truck_plate} · ${nextRdv.load_type} · ${nextRdv.tonnage}T</div>
      </div>
      <div style="text-align:right">
        <div class="next-rdv__label">${T('f-ref')}</div>
        <div class="next-rdv__ref">${nextRdv.id}</div>
        <div style="margin-top:.5rem"><span style="color:rgba(245,240,232,.7);font-size:.82rem">👤 ${nextRdv.driver_name}</span></div>
      </div>
    </div>`:`
    <div class="next-rdv" style="justify-content:center;text-align:center">
      <div>
        <div style="font-size:2rem;margin-bottom:.5rem">📭</div>
        <div style="color:rgba(245,240,232,.8);font-size:.95rem;margin-bottom:.8rem">${T('no-rdv-txt')}</div>
        <button class="btn btn--g btn--sm" onclick="showTab('new')">${T('take-rdv')}</button>
      </div>
    </div>`}
    <div class="dash-stats">
      <div class="stat-card" style="border-color:#27ae60"><div class="stat-card__icon">✅</div><div class="stat-card__val" style="color:#27ae60">${upcoming.length}</div><div class="stat-card__lbl">${T('stat-upcoming')}</div></div>
      <div class="stat-card" style="border-color:var(--gold)"><div class="stat-card__icon">⚖️</div><div class="stat-card__val" style="color:var(--gold)">${totalTonn.toFixed(0)}T</div><div class="stat-card__lbl">${T('stat-tonnage')}</div></div>
      <div class="stat-card" style="border-color:var(--orange)"><div class="stat-card__icon">⏳</div><div class="stat-card__val" style="color:var(--orange)">${waitlist.length}</div><div class="stat-card__lbl">${T('stat-waitlist')}</div></div>
      <div class="stat-card" style="border-color:${_score?.alert_level==='danger'?'var(--red)':_score?.alert_level==='warning'?'var(--orange)':'var(--mid)'}">
        <div class="stat-card__icon">${_score?.alert_level==='danger'?'🔴':_score?.alert_level==='warning'?'🟠':'✅'}</div>
        <div class="stat-card__val" style="color:${_score?.alert_level==='danger'?'var(--red)':_score?.alert_level==='warning'?'var(--orange)':'var(--mid)'}">${_score?.total_penalty||0}</div>
        <div class="stat-card__lbl">${T('stat-penalty')}</div>
      </div>
    </div>
    ${upcoming.length>0?`
    <div class="section-hdr"><h2>${T('next-rdvs-title')}</h2><button class="btn btn--o btn--sm" onclick="showTab('hist')">${T('see-all')}</button></div>
    ${upcoming.slice(0,4).map(a=>{
      const did='h'+a.id.replace(/[^a-z0-9]/gi,'');
      return`<div class="appt">
        <div class="appt__hd" onclick="toggleDetail('${did}')">
          <div class="appt__slot">${a.slot.slice(0,5)}</div>
          <div class="appt__info"><div class="appt__title">${fmtDate(a.date)}</div><div class="appt__sub">🚛 ${a.truck_plate} · 🫘 ${a.load_type} · ⚖️ ${a.tonnage}T</div></div>
          <span style="color:#27ae60;font-size:.8rem;font-weight:700">✅</span>
          <span style="color:var(--muted);margin-left:.4rem">▼</span>
        </div>
        <div class="appt__detail" id="${did}">
          <div class="appt__grid">
            ${[[T('df-driver'),a.driver_name],[T('df-phone'),a.driver_phone||'—'],[T('df-plate'),a.truck_plate],[T('df-load'),a.load_type],[T('df-tonnage'),a.tonnage+'T'],[T('df-order'),a.order_number],[T('df-company'),a.company_name||'—'],[T('df-notes'),a.notes||'—'],[T('df-ref'),a.id]].map(([l,v])=>`<div><span class="df__l">${l}</span><span class="df__v">${v}</span></div>`).join('')}
          </div>
          ${a.date>=now?`<button class="btn btn--r btn--sm" onclick="cancelAppt('${a.id}')">${T('btn-cancel-rdv')}</button>`:''}
        </div>
      </div>`;
    }).join('')}`:''}
    <div class="g2" style="margin-top:1.5rem">
      <button class="btn btn--p" style="padding:1.2rem;font-size:1rem;justify-content:center" onclick="showTab('new')">${T('quick-new')}</button>
      ${_u.role==='transporter'?`<button class="btn btn--o" style="padding:1.2rem;font-size:1rem;justify-content:center" onclick="showTab('drivers')">${T('quick-drivers')}</button>`:`<button class="btn btn--o" style="padding:1.2rem;font-size:1rem;justify-content:center" onclick="showTab('hist')">${T('quick-hist')}</button>`}
    </div>`;
}

// ── NOUVEAU RDV ───────────────────────────────────────
function renderNew(){
  const c=document.getElementById('tab-new'),now=todayStr();
  const da=_date?_appts.filter(a=>a.date===_date&&a.status!=='cancelled'):[];
  const taken=da.map(a=>a.slot.slice(0,5));
  const cap=da.filter(a=>a.status==='confirmed').length>=_sett.maxTrucks;
  const open=isDayOpen(_date,_cl);
  const cl_reason=_cl.find(cl=>cl.date===_date);
  c.innerHTML=`
    <div class="stepper">
      <div class="step ${_step>1?'done':_step===1?'now':''}"><div class="step__ico">📅</div><div class="step__lbl">${T('step-date')}</div></div>
      <div class="step ${_step>2?'done':_step===2?'now':''}"><div class="step__ico">🕐</div><div class="step__lbl">${T('step-slot')}</div></div>
      <div class="step ${_step===3?'now':''}"><div class="step__ico">📝</div><div class="step__lbl">${T('step-info')}</div></div>
    </div>
    <div class="card">
      <h3>${T('choose-date')}</h3>
      <div class="field" style="max-width:260px;margin-bottom:.8rem">
        <input class="inp" type="date" id="rdv-date" value="${_date}" min="${now}" onchange="changeDate(this.value)"/>
      </div>
      ${_date&&!open?`<div class="al al--e">${HOLIDAYS.has(_date)?T('closed-holiday'):cl_reason?'⚠️ '+(LANG==='es'?'Cierre':'Fermeture')+' : '+cl_reason.reason:T('closed-weekend')}</div>`:''}
      ${_date&&open&&cap?`<div class="al al--w">${T('cap-warn')}</div>`:''}
      <p class="muted" style="margin-top:.4rem">${T('hint-opendays')}</p>
      ${_step>=2&&_date&&open?`
      <div style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem">
        <h3>${T('slots-title')} — ${fmtDate(_date)}</h3>
        <div class="slots mb">${SLOTS.map(s=>`<button class="slot ${taken.includes(s)?'taken':_slot===s?'selected':''}" ${taken.includes(s)?'disabled':''} onclick="pickSlot('${s}')">${s}</button>`).join('')}</div>
        <p class="muted">${T('slots-legend')}</p>
      </div>`:''}
      ${_step>=3&&_slot?`
      <div style="margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem">
        <h3>${T('info-title')}</h3>
        <div class="al al--s mb">✅ ${fmtDate(_date)} · ${_slot} – ${addMins(_slot,30)}</div>
        <div class="fg">
          <div class="field"><label class="lbl">${T('f-dn')}</label><input class="inp" id="f-dn" value="${_u.role==='driver'?_u.first_name+' '+_u.last_name:''}"/></div>
          <div class="field"><label class="lbl">${T('f-dp')}</label><input class="inp" id="f-dp" value="${_u.role==='driver'?_u.phone:''}" placeholder="06 / +34 6XX"/></div>
          <div class="field"><label class="lbl">${T('f-tp')}</label><input class="inp" id="f-tp" placeholder="AB-123-CD"/></div>
          <div class="field"><label class="lbl">${T('f-lt')}</label><select class="sel" id="f-lt">${LOAD_TYPES.map(lt=>`<option>${lt}</option>`).join('')}</select></div>
          <div class="field"><label class="lbl">${T('f-to')}</label><input class="inp" type="number" id="f-to" placeholder="28"/></div>
          <div class="field"><label class="lbl">${T('f-on')}</label><input class="inp" id="f-on" placeholder="BC-2025-XXXXX"/></div>
          <div class="field s2"><label class="lbl">${T('f-no')}</label><textarea class="ta" id="f-no"></textarea></div>
        </div>
        <div id="rdv-al"></div>
        <button class="btn btn--p btn--fw" style="margin-top:1rem" onclick="submitRdv()">${cap?T('btn-waitlist'):T('btn-confirm')}</button>
      </div>`:''}
    </div>`;
}

function changeDate(v){
  _date=v;_slot='';
  if(v&&isDayOpen(v,_cl)){
    _step=2;
    RDV.getDayAppts(v).then(da=>{_appts=_appts.filter(a=>a.date!==v).concat(da);renderNew();});
  }else{_step=1;renderNew();}
}
function pickSlot(s){_slot=s;_step=3;renderNew();}

async function submitRdv(){
  const btn=document.querySelector('[onclick="submitRdv()"]'),done=btnLoading(btn,'…');
  const data={date:_date,slot:_slot,driver_name:$('#f-dn')?.value.trim(),driver_phone:$('#f-dp')?.value.trim(),truck_plate:$('#f-tp')?.value.trim(),load_type:$('#f-lt')?.value,tonnage:$('#f-to')?.value,order_number:$('#f-on')?.value.trim(),notes:$('#f-no')?.value,company_name:_u.company};
  if(!data.driver_name||!data.driver_phone||!data.truck_plate||!data.tonnage||!data.order_number){
    done();document.getElementById('rdv-al').innerHTML=`<div class="al al--e">${T('required-fields')}</div>`;return;
  }
  try{
    const{appt,status}=await RDV.create(_u,data);
    _appts.push(appt);
    document.getElementById('tab-new').innerHTML=`
      <div class="card" style="background:var(--green);text-align:center;padding:3rem 2rem">
        <div style="font-size:3rem;margin-bottom:1rem">${status==='waitlist'?'⏳':'✅'}</div>
        <h2 style="color:var(--goldL);font-size:1.8rem;margin-bottom:.5rem">${T(status==='waitlist'?'conf-title-wl':'conf-title-ok')}</h2>
        <div style="background:rgba(255,255,255,.1);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:1.4rem;margin:1.4rem auto;max-width:440px;text-align:left">
          <div style="color:var(--goldL);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem">${T('f-ref')}</div>
          <div style="font-family:monospace;font-size:1.3rem;font-weight:700;color:white;margin-bottom:1rem">${appt.id}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.85rem;color:rgba(245,240,232,.9)">
            ${[[T('f-date'),fmtDate(appt.date)],[T('f-slot'),`${appt.slot}–${addMins(appt.slot,30)}`],[T('f-driver'),appt.driver_name],[T('f-phone'),appt.driver_phone],[T('f-plate'),appt.truck_plate],[T('f-load'),appt.load_type],[T('f-tonnage'),appt.tonnage+'T'],[T('f-order'),appt.order_number]].map(([l,v])=>`<div><span style="opacity:.6;display:block;font-size:.7rem">${l}</span><strong>${v}</strong></div>`).join('')}
          </div>
        </div>
        <p style="color:rgba(245,240,232,.6);font-size:.86rem;margin-bottom:1.4rem">${T('conf-email')} ${_u.email}</p>
        <button class="btn btn--g" onclick="resetRdv()">${T('btn-another')}</button>
      </div>`;
    Email.confirmed(_u,appt);
  }catch(e){done();document.getElementById('rdv-al').innerHTML=`<div class="al al--e">${e.message}</div>`;}
}
function resetRdv(){_step=1;_date='';_slot='';renderNew();}

// ── HISTORIQUE ────────────────────────────────────────
function renderHist(){
  const c=document.getElementById('tab-hist'),now=todayStr();
  const list=_appts.filter(a=>{
    if(_hf==='upcoming')return a.date>=now&&a.status!=='cancelled';
    if(_hf==='past')    return a.date<now;
    if(_hf==='cancelled')return a.status==='cancelled';
    return true;
  }).sort((a,b)=>_hf==='upcoming'?a.date.localeCompare(b.date):b.date.localeCompare(a.date));
  c.innerHTML=`
    <div class="section-hdr"><h2>${T('hist-title')}</h2></div>
    <div class="flex gap-sm mb" style="flex-wrap:wrap">
      ${[['upcoming',T('filter-upcoming')],['past',T('filter-past')],['cancelled',T('filter-cancelled')],['all',T('filter-all')]].map(([v,l])=>`<button class="btn btn--pill btn--o ${_hf===v?'on':''}" onclick="_hf='${v}';renderHist()">${l}</button>`).join('')}
    </div>
    ${list.length===0?`<div class="card tc" style="padding:3rem"><div style="font-size:2.5rem;margin-bottom:1rem">📭</div><p class="muted">${T('no-rdv-here')}</p><button class="btn btn--p mt" onclick="showTab('new')">${T('take-rdv')}</button></div>`:
    list.map(a=>{
      const xx=a.status==='cancelled',wl=a.status==='waitlist';
      const sc=xx?'var(--red)':wl?'var(--orange)':'#27ae60';
      const did='d'+a.id.replace(/[^a-z0-9]/gi,'');
      const statusLabel=xx?T('status-cancelled'):wl?T('status-waitlist'):T('status-confirmed');
      return`<div class="appt">
        <div class="appt__hd" onclick="toggleDetail('${did}')">
          <div class="appt__slot ${xx?'xx':wl?'wl':''}">${a.slot.slice(0,5)}</div>
          <div class="appt__info">
            <div class="appt__title">${fmtDate(a.date)}</div>
            <div class="appt__sub">🚛 ${a.truck_plate} · 🫘 ${a.load_type} · ⚖️ ${a.tonnage}T</div>
          </div>
          <span style="color:${sc};font-size:.8rem;font-weight:700">${statusLabel}</span>
          <span style="color:var(--muted);margin-left:.3rem">▼</span>
        </div>
        <div class="appt__detail" id="${did}">
          <div class="appt__grid">
            ${[[T('df-driver'),a.driver_name],[T('df-phone'),a.driver_phone||'—'],[T('df-plate'),a.truck_plate],[T('df-load'),a.load_type],[T('df-tonnage'),a.tonnage+'T'],[T('df-order'),a.order_number],[T('df-company'),a.company_name||'—'],[T('df-notes'),a.notes||'—'],[T('df-ref'),a.id]].map(([l,v])=>`<div><span class="df__l">${l}</span><span class="df__v">${v}</span></div>`).join('')}
          </div>
          ${!xx&&a.date>=now?`<button class="btn btn--r btn--sm" onclick="cancelAppt('${a.id}')">${T('btn-cancel-rdv')}</button>`:''}
        </div>
      </div>`;
    }).join('')}`;
}

async function cancelAppt(id){
  if(!confirm(T('confirm-cancel')))return;
  await RDV.cancel(id);
  const a=_appts.find(x=>x.id===id);
  _appts=_appts.map(x=>x.id===id?{...x,status:'cancelled'}:x);
  if(a)Email.cancelled(_u,a);
  _activeTab==='home'?renderHome():renderHist();
}

// ── CHAUFFEURS ────────────────────────────────────────
function renderDrivers(){
  const c=document.getElementById('tab-drivers');
  c.innerHTML=`
    <div class="section-hdr"><h2>${T('drv-title')}</h2><button class="btn btn--p btn--sm" onclick="showInviteDriver()">${T('drv-invite-btn')}</button></div>
    <div id="inv-driver-form"></div>
    ${_drivers.length===0?`<div class="card tc" style="padding:3rem"><div style="font-size:2.5rem;margin-bottom:1rem">👥</div><p class="muted">${T('drv-empty').replace('\n','<br>')}</p></div>`:
    `<div>${_drivers.map(d=>`
      <div class="user-card">
        <div class="user-card__avatar" style="background:var(--blue)">🚗</div>
        <div class="user-card__info">
          <div class="user-card__name">${d.first_name} ${d.last_name}</div>
          <div class="user-card__sub">${d.email} · ${d.phone}</div>
        </div>
        <span class="badge ${d.status==='active'?'badge--g':d.status==='pending'?'badge--o':'badge--r'}">${T('drv-'+d.status)}</span>
        <div class="user-card__actions">
          ${d.status==='active'?`<button class="btn btn--r btn--sm" onclick="disableDriver('${d.id}')">${T('drv-disable')}</button>`:
            d.status==='disabled'?`<button class="btn btn--o btn--sm" onclick="enableDriver('${d.id}')">${T('drv-enable')}</button>`:''}
        </div>
      </div>`).join('')}</div>`}`;
}

function showInviteDriver(){
  document.getElementById('inv-driver-form').innerHTML=`
    <div class="card card--b mb" style="border:2px solid var(--mid)">
      <h3 style="margin-bottom:.7rem">${T('inv-title')}</h3>
      <p style="color:var(--sub);font-size:.85rem;margin-bottom:1rem">${T('inv-desc')}</p>
      <div id="inv-d-al"></div>
      <div class="fg">
        <div class="field"><label class="lbl">${T('inv-email')}</label><input class="inp" id="inv-em" type="email"/></div>
        <div class="field"><label class="lbl">${T('inv-note')}</label><input class="inp" id="inv-no"/></div>
      </div>
      <div class="flex gap-sm mt">
        <button class="btn btn--p" onclick="sendDriverInvite()">${T('inv-send')}</button>
        <button class="btn btn--o" onclick="document.getElementById('inv-driver-form').innerHTML=''">${T('inv-cancel')}</button>
      </div>
    </div>`;
}

async function sendDriverInvite(){
  const em=document.getElementById('inv-em').value.trim();
  const no=document.getElementById('inv-no').value.trim();
  const al=document.getElementById('inv-d-al');
  try{
    const inv=await Auth.createInvitation(em,'driver',_u.id,no);
    await Email.inviteDriver(em,inv.token,_u,no);
    al.innerHTML=`<div class="al al--s">${T('inv-ok')} ${em}</div>`;
    document.getElementById('inv-em').value='';document.getElementById('inv-no').value='';
    setTimeout(()=>{document.getElementById('inv-driver-form').innerHTML='';},3000);
  }catch(e){al.innerHTML=`<div class="al al--e">${e.message}</div>`;}
}

async function disableDriver(id){
  if(!confirm(T('confirm-disable')))return;
  await SB.update('users',{id:`eq.${id}`},{status:'disabled'});
  _drivers=_drivers.map(d=>d.id===id?{...d,status:'disabled'}:d);renderDrivers();
}
async function enableDriver(id){
  await SB.update('users',{id:`eq.${id}`},{status:'active'});
  _drivers=_drivers.map(d=>d.id===id?{...d,status:'active'}:d);renderDrivers();
}

// ── PROFIL ────────────────────────────────────────────
function renderProf(){
  const c=document.getElementById('tab-prof'),u=_u;
  c.innerHTML=`
    <div class="section-hdr"><h2>${T('prof-title')}</h2></div>
    <div class="card">
      <div id="pal"></div>
      <div class="fg">
        <div class="field"><label class="lbl">${T('p-fn')}</label><input class="inp" id="p-fn" value="${u.first_name||''}"/></div>
        <div class="field"><label class="lbl">${T('p-ln')}</label><input class="inp" id="p-ln" value="${u.last_name||''}"/></div>
        <div class="field"><label class="lbl">${T('p-co')}</label><input class="inp" id="p-co" value="${u.company||''}"/></div>
        <div class="field"><label class="lbl">${T('p-ph')}</label><input class="inp" id="p-ph" value="${u.phone||''}"/></div>
        <div class="field"><label class="lbl">${T('p-si')}</label><input class="inp" id="p-si" value="${u.siret||''}"/></div>
        <div class="field"><label class="lbl">${T('p-em')}</label><input class="inp" type="email" id="p-em" value="${u.email||''}"/></div>
        <div class="field s2"><label class="lbl">${T('p-ad')}</label><input class="inp" id="p-ad" value="${u.address||''}"/></div>
        <div class="field"><label class="lbl">${T('p-pw')}</label><input class="inp" type="password" id="p-pw" placeholder="${T('p-pw-hint')}"/></div>
      </div>
      <button class="btn btn--p mt" onclick="saveProf()">${T('p-save')}</button>
    </div>
    ${_score&&_score.total_incidents>0?`
    <div class="card mt">
      <h3 style="margin-bottom:.8rem">${T('p-incidents')}</h3>
      <div class="flex gap-sm" style="margin-bottom:1rem;flex-wrap:wrap">
        <span class="penalty-badge ${_score.alert_level}">${T('p-score')} ${_score.total_penalty} pt</span>
        ${_score.no_shows>0?`<span class="badge badge--r">${T('p-noshow')} ${_score.no_shows}</span>`:''}
        ${_score.lates>0?`<span class="badge badge--o">${T('p-lates')} ${_score.lates}</span>`:''}
        ${_score.partial_loads>0?`<span class="badge badge--y">${T('p-partial')} ${_score.partial_loads}</span>`:''}
      </div>
      <p style="font-size:.84rem;color:var(--sub)">${T('p-contest')} <a href="tel:0562960000">05 62 96 00 00</a> · <a href="mailto:contact@sojalim.fr">contact@sojalim.fr</a></p>
    </div>`:''}`;
}

async function saveProf(){
  const al=document.getElementById('pal');
  try{
    await Auth.updateProfile(_u.id,{
      first_name:$('#p-fn')?.value.trim(),last_name:$('#p-ln')?.value.trim(),
      company:$('#p-co')?.value.trim(),phone:$('#p-ph')?.value.trim(),
      siret:$('#p-si')?.value.trim(),email:$('#p-em')?.value.trim(),
      address:$('#p-ad')?.value.trim(),password:$('#p-pw')?.value||undefined
    });
    _u=Auth.user();
    document.getElementById('uname').textContent=_u.first_name;
    showAlert(al,T('p-ok'),'success');
  }catch(e){showAlert(al,e.message);}
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
