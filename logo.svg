<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <defs>
    <clipPath id="clip-leaf">
      <ellipse cx="0" cy="0" rx="28" ry="14"/>
    </clipPath>
  </defs>

  <!-- Fond cercle vert -->
  <circle cx="58" cy="60" r="52" fill="#1a3a2a"/>

  <!-- Tige centrale -->
  <line x1="58" y1="80" x2="58" y2="42" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Feuille gauche -->
  <g transform="translate(58,60) rotate(-45)">
    <ellipse cx="-18" cy="0" rx="20" ry="10" fill="#52b788"/>
    <line x1="0" y1="0" x2="-36" y2="0" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <line x1="-8" y1="-4" x2="-28" y2="-6" stroke="#2d6a4f" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-8" y1="4" x2="-28" y2="6" stroke="#2d6a4f" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Feuille droite -->
  <g transform="translate(58,60) rotate(45)">
    <ellipse cx="18" cy="0" rx="20" ry="10" fill="#52b788"/>
    <line x1="0" y1="0" x2="36" y2="0" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="-4" x2="28" y2="-6" stroke="#2d6a4f" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="8" y1="4" x2="28" y2="6" stroke="#2d6a4f" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Feuille haut dorée -->
  <g transform="translate(58,60) rotate(-90)">
    <ellipse cx="18" cy="0" rx="20" ry="10" fill="#c9a84c"/>
    <line x1="0" y1="0" x2="36" y2="0" stroke="#a07800" stroke-width="1" stroke-linecap="round"/>
    <line x1="8" y1="-4" x2="28" y2="-6" stroke="#a07800" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="8" y1="4" x2="28" y2="6" stroke="#a07800" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Grain central -->
  <ellipse cx="58" cy="64" rx="7" ry="9" fill="#e8c96e"/>
  <ellipse cx="58" cy="64" rx="4" ry="6" fill="#c9a84c"/>

  <!-- Texte SOJALIM -->
  <text x="124" y="52" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1a3a2a" letter-spacing="2">SOJALIM</text>

  <!-- Ligne dorée -->
  <line x1="124" y1="62" x2="392" y2="62" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Sanders Euralis -->
  <text x="125" y="78" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#2d6a4f" letter-spacing="3">SANDERS EURALIS</text>

  <!-- Tag -->
  <rect x="124" y="88" width="266" height="16" rx="8" fill="#eef7f2"/>
  <text x="257" y="99" font-family="Arial, sans-serif" font-size="7.5" fill="#2d6a4f" text-anchor="middle" letter-spacing="1">TRITURATION DE SOJA · OCCITANIE</text>
</svg>
