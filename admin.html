<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Administration — Sojalim RDV</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a3a2a"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb__brand">
      <img src="https://www.sanders.fr/wp-content/themes/sanders/dist/assets/logo-header-lv8jqXRJ.svg" alt="Sanders" onerror="this.style.display='none'"/>
      <img src="https://www.euralis.fr/wp-content/uploads/2021/09/logo.png" alt="Euralis" style="margin-top:.4rem" onerror="this.style.display='none'"/>
      <div class="sb__sub" id="aname">Administrateur</div>
    </div>
    <nav class="sb__nav">
      <button class="sb__lnk on" onclick="gt('dash')"    id="n-dash">🏠 Tableau de bord</button>
      <button class="sb__lnk"   onclick="gt('plan')"    id="n-plan">📅 Planning</button>
      <button class="sb__lnk"   onclick="gt('cal')"     id="n-cal">📆 Calendrier</button>
      <button class="sb__lnk"   onclick="gt('search')"  id="n-search">🔍 Recherche</button>
      <button class="sb__lnk"   onclick="gt('users')"   id="n-users">👥 Comptes</button>
      <button class="sb__lnk"   onclick="gt('invites')" id="n-invites">✉️ Invitations</button>
      <button class="sb__lnk"   onclick="gt('closures')"id="n-closures">🚫 Fermetures</button>
      <button class="sb__lnk"   onclick="gt('stats')"   id="n-stats">📊 Statistiques</button>
      <button class="sb__lnk"   onclick="gt('sett')"    id="n-sett">⚙️ Paramètres</button>
    </nav>
    <div class="sb__foot">
      <div class="pwa-wrap">
        <button class="btn btn--gh btn--sm pwa-btn" onclick="installPWA(this)" style="display:none;width:100%;border-radius:8px">📲 Installer l'app</button>
        <div class="pwa-tip"><p style="font-size:.82rem;color:var(--sub)">🤖 Menu ⋮ → Ajouter · 🍎 Partager → Écran d'accueil</p></div>
      </div>
      <button class="btn btn--gh btn--sm" onclick="Auth.logout()" style="width:100%;border-radius:8px">🔒 Déconnexion</button>
    </div>
  </aside>
  <main class="main"><div class="content" id="ac"><div class="loader"><div class="spinner"></div></div></div></main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/email.js"></script>
<script src="js/rdv.js"></script>
<script>
let _adm=null,_appts=[],_cl=[],_users=[],_sett={},_invites=[];
let _tab='dash',_pd=todayStr(),_pf='all',_ps='';
let _cy=new Date().getFullYear(),_cm=new Date().getMonth();
let _gq='',_gt='all',_uf='all',_us='';

async function init(){
  _adm=Auth.require(['admin']);if(!_adm)return;
  document.getElementById('aname').textContent='Connecté : '+_adm.first_name;
  await reload();gt('dash');
}

async function reload(){
  const[a,c,u,s,i]=await Promise.all([
    RDV.getAllAppts().catch(()=>[]),
    RDV.getClosures().catch(()=>[]),
    SB.select('users',{select:'id,email,role,first_name,last_name,company,phone,siret,address,status,parent_id,last_login,created_at',order:'created_at.desc'}).catch(()=>[]),
    RDV.getSettings().catch(()=>({maxTrucks:20})),
    SB.select('invitations',{select:'*',order:'created_at.desc'}).catch(()=>[]),
  ]);
  _appts=a;_cl=c;_users=u||[];_sett=s;_invites=i||[];
}

function gt(tab){
  _tab=tab;
  document.querySelectorAll('.sb__lnk').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('n-'+tab);if(nb)nb.classList.add('on');
  const c=document.getElementById('ac');
  c.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const fns={dash:rDash,plan:rPlan,cal:rCal,search:rSearch,users:rUsers,invites:rInvites,closures:rClosures,stats:rStats,sett:rSett};
  setTimeout(()=>{if(fns[tab])fns[tab]();},40);
}

// ── DASHBOARD ─────────────────────────────────────────
function rDash(){
  const c=document.getElementById('ac'),now=todayStr();
  const todayOk=_appts.filter(a=>a.date===now&&a.status==='confirmed');
  const yr=new Date().getFullYear();
  const yrOk=_appts.filter(a=>a.status==='confirmed'&&a.date?.startsWith(String(yr)));
  const wl=_appts.filter(a=>a.status==='waitlist');
  const tonn=todayOk.reduce((s,a)=>s+parseFloat(a.tonnage||0),0);
  const pendU=_users.filter(u=>u.status==='pending');
  c.innerHTML=`
    <h2>Tableau de bord</h2>
    <div class="g3 mb">
      ${[['📅','RDV aujourd\'hui',todayOk.length,'var(--mid)'],['⚖️','Tonnage aujourd\'hui',tonn.toFixed(0)+'T','var(--gold)'],['⏳','Liste d\'attente',wl.length,'var(--orange)'],['🚛','RDV cette année',yrOk.length,'var(--blue)'],['👥','Transporteurs',_users.filter(u=>u.role==='transporter').length,'var(--light)'],['🔴','En attente approbation',pendU.length,'var(--red)']].map(([ic,lb,val,ac])=>`<div class="card" style="border-left:4px solid ${ac};padding:1.2rem"><div>${ic}</div><div style="font-size:2rem;font-weight:800;color:${ac};line-height:1.1;margin-top:.1rem">${val}</div><div style="font-size:.8rem;color:var(--muted)">${lb}</div></div>`).join('')}
    </div>
    ${pendU.length>0?`<div class="card card--y mb" style="border:2px solid var(--orange)"><h3 style="color:var(--orange);margin-bottom:1rem">⏳ Approbations en attente (${pendU.length})</h3>${pendU.map(u=>`<div style="display:flex;align-items:center;gap:1rem;padding:.8rem;background:white;border-radius:8px;margin-bottom:.5rem;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div style="font-weight:700;color:var(--green)">${u.first_name} ${u.last_name} — ${u.company}</div><div style="font-size:.82rem;color:var(--sub)">${u.email} · ${u.phone} · <span class="badge role-${u.role}">${u.role}</span></div></div><div class="flex gap-sm"><button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button><button class="btn btn--r btn--sm" onclick="rejectU('${u.id}')">❌ Refuser</button></div></div>`).join('')}</div>`:''}
    <div class="card"><h3 style="margin-bottom:1rem">Planning du jour — ${fmtDate(now)}</h3>
    ${todayOk.length===0?'<p class="muted tc" style="padding:2rem">Aucun rendez-vous aujourd\'hui</p>':
    `<div style="display:flex;flex-direction:column;gap:.4rem">${todayOk.sort((a,b)=>a.slot.localeCompare(b.slot)).map(a=>`<div style="display:flex;gap:.8rem;align-items:center;padding:.6rem .9rem;background:var(--g10);border-radius:8px;flex-wrap:wrap"><strong style="color:var(--mid);min-width:50px">${a.slot.slice(0,5)}</strong><span style="flex:1;font-weight:600">${a.driver_name}</span><span style="color:var(--sub);font-size:.85rem">${a.company_name}</span><span style="color:var(--sub);font-size:.85rem">${a.truck_plate}</span><span style="color:var(--muted);font-size:.82rem">${a.load_type} · ${a.tonnage}T</span></div>`).join('')}</div>`}
    <button class="btn btn--p btn--sm mt" onclick="gt('plan')">Voir le planning complet →</button></div>`;
}

// ── PLANNING ──────────────────────────────────────────
function rPlan(){
  const c=document.getElementById('ac');
  const da=_appts.filter(a=>a.date===_pd);
  const filt=da.filter(a=>_pf==='all'||a.status===_pf).filter(a=>!_ps||[a.driver_name,a.company_name,a.truck_plate,a.order_number,a.id].join(' ').toLowerCase().includes(_ps.toLowerCase())).sort((a,b)=>a.slot.localeCompare(b.slot));
  const confToday=da.filter(a=>a.status==='confirmed');
  c.innerHTML=`
    <div class="flex fxb mb" style="flex-wrap:wrap;gap:.8rem"><h2 style="margin:0">Planning</h2><button class="btn btn--o btn--sm" onclick="printPlan()">🖨 Imprimer</button></div>
    <div style="display:grid;grid-template-columns:260px 1fr;gap:1.2rem;align-items:start">
      <div class="card">
        <div class="flex fxb" style="margin-bottom:.8rem">
          <button class="btn btn--o btn--sm" onclick="navD(-1)">◀</button>
          <input type="date" id="pd" value="${_pd}" style="border:none;font-weight:700;color:var(--green);font-size:.88rem;cursor:pointer;outline:none;font-family:inherit;text-align:center" onchange="_pd=this.value;rPlan()"/>
          <button class="btn btn--o btn--sm" onclick="navD(1)">▶</button>
        </div>
        ${!isDayOpen(_pd,_cl)?'<div class="al al--e" style="font-size:.78rem;padding:.4rem .7rem">⛔ Jour non ouvrable</div>':''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-bottom:.8rem">
          ${SLOTS.map(s=>{const a=da.find(d=>d.slot.slice(0,5)===s&&d.status!=='cancelled');return`<button onclick="doSlot('${s}')" style="padding:.5rem .4rem;border-radius:6px;border:1.5px solid ${a?'var(--g20)':'var(--border)'};background:${a?'var(--g10)':'white'};color:${a?'var(--mid)':'var(--muted)'};font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit">${s}${a?' ✓':''}</button>`;}).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.8rem">
          ${[['✅',da.filter(a=>a.status==='confirmed').length,'#27ae60'],['⏳',da.filter(a=>a.status==='waitlist').length,'var(--orange)'],['❌',da.filter(a=>a.status==='cancelled').length,'var(--red)'],['⚖️',confToday.reduce((s,a)=>s+parseFloat(a.tonnage||0),0).toFixed(0)+'T','var(--gold)']].map(([ic,v,col])=>`<div style="border:1px solid var(--border);border-radius:6px;padding:.5rem;text-align:center"><div style="font-size:.8rem">${ic}</div><div style="font-size:1.1rem;font-weight:800;color:${col}">${v}</div></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="flex fxb mb" style="flex-wrap:wrap;gap:.5rem">
          <h3 style="margin:0">Rendez-vous (${filt.length})</h3>
          <div class="flex gap-sm" style="flex-wrap:wrap">${[['all','Tous'],['confirmed','✅'],['waitlist','⏳'],['cancelled','❌']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_pf===v?'on':''}" onclick="_pf='${v}';rPlan()">${l}</button>`).join('')}</div>
        </div>
        <div class="srch mb"><span class="srch-ico">🔍</span><input class="inp srch-inp" value="${_ps}" placeholder="Chauffeur, plaque, BC…" oninput="_ps=this.value;rPlan()"/></div>
        ${filt.length===0?'<p class="muted tc" style="padding:1.5rem">Aucun rendez-vous</p>':filt.map(a=>aRow(a)).join('')}
      </div>
    </div>`;
}

function aRow(a){
  const xx=a.status==='cancelled',wl=a.status==='waitlist';
  const sc=xx?'var(--red)':wl?'var(--orange)':'#27ae60';
  const did='ar'+a.id.replace(/[^a-z0-9]/gi,'');
  return`<div style="border:1.5px solid ${xx?'#fde8e8':wl?'#fff3cd':'var(--g20)'};border-radius:9px;overflow:hidden;margin-bottom:.6rem">
    <div onclick="toggleDetail('${did}')" style="display:flex;align-items:center;padding:.7rem 1rem;gap:.8rem;cursor:pointer;background:${xx?'var(--redbg)':wl?'#fffdf0':'var(--g10)'}">
      <div style="background:${sc};color:white;border-radius:6px;padding:.25rem .6rem;font-size:.8rem;font-weight:700;flex-shrink:0">${a.slot.slice(0,5)}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;color:var(--green);font-size:.9rem">${a.driver_name} <span style="color:var(--muted);font-weight:400;font-size:.85rem">— ${a.company_name||'—'}</span></div><div style="font-size:.78rem;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🚛 ${a.truck_plate} · 📞 ${a.driver_phone||'—'} · 🫘 ${a.load_type} · ⚖️ ${a.tonnage}T</div></div>
      <span style="font-size:.72rem;color:var(--muted);font-family:monospace;flex-shrink:0">${a.id}</span>
      <span style="color:var(--muted)">▼</span>
    </div>
    <div id="${did}" style="display:none;padding:.9rem 1.1rem;background:white;border-top:1px solid var(--border)">
      <div class="appt__grid" style="margin-bottom:.9rem">
        ${[['Chauffeur',a.driver_name],['Tél.',a.driver_phone||'—'],['Plaque',a.truck_plate],['Chargement',a.load_type],['Tonnage',a.tonnage+'T'],['Bon de cmd',a.order_number],['Société',a.company_name||'—'],['Notes',a.notes||'—'],['Créé le',fmtDT(a.created_at)]].map(([l,v])=>`<div><span class="df__l">${l}</span><span class="df__v">${v}</span></div>`).join('')}
      </div>
      <div class="flex gap-sm" style="flex-wrap:wrap">
        ${wl?`<button class="btn btn--o btn--sm" onclick="promoteA('${a.id}')">⬆️ Confirmer</button>`:''}
        ${!xx?`<button class="btn btn--r btn--sm" onclick="cancelA('${a.id}')">❌ Annuler</button>`:`<button class="btn btn--o btn--sm" onclick="restoreA('${a.id}')">✅ Restaurer</button>`}
        ${!xx&&a.user_id?`<button class="btn btn--sm" style="background:#e8f4ff;color:var(--blue);border:1px solid #bee3f8" onclick="remind('${a.id}')">📨 Rappel</button>`:''}
        <button class="btn btn--o btn--sm" onclick="delA('${a.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

function navD(d){const dt=new Date(_pd+'T12:00:00');dt.setDate(dt.getDate()+d);while(dt.getDay()===0||dt.getDay()===6)dt.setDate(dt.getDate()+d);_pd=dt.toISOString().split('T')[0];rPlan();}
function doSlot(s){alert('Créneau '+s+' — fonctionnalité de création manuelle RDV');}
async function cancelA(id){if(!confirm('Annuler ?'))return;await RDV.cancel(id);_appts=_appts.map(a=>a.id===id?{...a,status:'cancelled'}:a);rPlan();}
async function restoreA(id){await RDV.updateStatus(id,'confirmed');_appts=_appts.map(a=>a.id===id?{...a,status:'confirmed'}:a);rPlan();}
async function promoteA(id){await RDV.updateStatus(id,'confirmed');_appts=_appts.map(a=>a.id===id?{...a,status:'confirmed'}:a);rPlan();}
async function delA(id){if(!confirm('Supprimer définitivement ?'))return;await RDV.deleteAppt(id);_appts=_appts.filter(a=>a.id!==id);rPlan();}
async function remind(id){const a=_appts.find(x=>x.id===id);const u=_users.find(x=>x.id===a?.user_id);if(u&&a)await Email.reminder(u,a);alert('📨 Rappel envoyé !');}
function printPlan(){const da=_appts.filter(a=>a.date===_pd&&a.status!=='cancelled').sort((a,b)=>a.slot.localeCompare(b.slot));const rows=da.map(a=>`${a.slot.slice(0,5)}–${addMins(a.slot.slice(0,5),30)}  |  ${a.driver_name}  |  ${a.driver_phone||'—'}  |  ${a.truck_plate}  |  ${a.load_type}  |  ${a.tonnage}T  |  ${a.order_number}`).join('\n');const w=window.open('','_blank');w.document.write(`<html><body><pre style="font-family:monospace;padding:2rem;font-size:13px"><h2>Planning Sojalim — ${fmtDate(_pd)}</h2><p>193 Impasse Lautrec, 65500 Vic-en-Bigorre · 05 62 96 00 00</p><hr>\n${rows||'Aucun rendez-vous'}\n\nTotal : ${da.filter(a=>a.status==='confirmed').length} RDV · ${da.reduce((s,a)=>s+parseFloat(a.tonnage||0),0).toFixed(0)}T</pre></body></html>`);w.print();}

// ── CALENDRIER ────────────────────────────────────────
function rCal(){
  const c=document.getElementById('ac');
  const mnames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dn=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const first=new Date(_cy,_cm,1),last=new Date(_cy,_cm+1,0);
  const startDow=(first.getDay()||7)-1;
  const cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=last.getDate();d++)cells.push(new Date(_cy,_cm,d));
  const maxT=_sett.maxTrucks||20,now=todayStr();
  const ms=`${_cy}-${String(_cm+1).padStart(2,'0')}`;
  const mOk=_appts.filter(a=>a.status==='confirmed'&&a.date?.startsWith(ms));
  const mTonn=mOk.reduce((s,a)=>s+parseFloat(a.tonnage||0),0);
  const dAct=new Set(mOk.map(a=>a.date)).size;
  c.innerHTML=`
    <h2>Calendrier mensuel</h2>
    <div class="flex fxb mb" style="flex-wrap:wrap;gap:1rem">
      <div class="flex fxc gap"><button class="btn btn--o" onclick="_cm--;if(_cm<0){_cm=11;_cy--;}rCal()">◀</button><h3 style="min-width:200px;text-align:center;margin:0">${mnames[_cm]} ${_cy}</h3><button class="btn btn--o" onclick="_cm++;if(_cm>11){_cm=0;_cy++;}rCal()">▶</button></div>
      <div class="flex gap-sm" style="flex-wrap:wrap;font-size:.78rem">${[['var(--g10)','Confirmés'],['var(--redbg)','Fermé/Férié'],['#fff3e0','Plein'],['white','Ouvert']].map(([bg,l])=>`<span class="flex fxc gap-sm" style="color:var(--sub)"><span style="display:inline-block;width:12px;height:12px;background:${bg};border:1px solid var(--border);border-radius:2px"></span>${l}</span>`).join('')}</div>
    </div>
    <div class="card" style="padding:1.5rem">
      <div class="cal-hd">${dn.map(d=>`<div class="cal-dn ${d==='Sam'||d==='Dim'?'we':''}">${d}</div>`).join('')}</div>
      <div class="cal-grid">
        ${cells.map(d=>{
          if(!d)return'<div class="cal-cell empty"></div>';
          const ds=d.toISOString().split('T')[0];
          const da=_appts.filter(a=>a.date===ds&&a.status!=='cancelled');
          const conf=da.filter(a=>a.status==='confirmed').length;
          const wl=da.filter(a=>a.status==='waitlist').length;
          const isH=HOLIDAYS.has(ds),isC=!!_cl.find(cl=>cl.date===ds),isW=d.getDay()===0||d.getDay()===6,isT=ds===now,isFull=conf>=maxT;
          const cls=['cal-cell',isT?'today':'',isH||isC||isW?'closed':isFull?'full':conf>0?'has':''].join(' ');
          const pct=conf/maxT;
          return`<div class="${cls}" onclick="${!isW&&!isH&&!isC?`_pd='${ds}';gt('plan')`:''}">
            <div class="cal-num ${isW||isH||isC?'cl':''} ${isT?'td':''}">${d.getDate()}</div>
            ${!isW&&!isH&&!isC&&conf>0?`<div class="cal-cnt">🚛 ${conf}/${maxT}</div>`:''}
            ${wl>0?`<div style="font-size:.67rem;color:var(--orange)">⏳ ${wl}</div>`:''}
            ${!isW&&!isH&&!isC&&conf>0?`<div class="cal-bar"><div class="cal-fill ${pct>=1?'or':''}" style="width:${Math.min(pct,1)*100}%"></div></div>`:''}
            ${isH?'<div style="font-size:.63rem;color:var(--red)">Férié</div>':''}
            ${isC?'<div style="font-size:.63rem;color:var(--red)">Fermé</div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="g3 mt">
      ${[['🚛','RDV ce mois',mOk.length,'var(--mid)'],['⚖️','Tonnage',mTonn.toFixed(0)+'T','var(--gold)'],['📅','Jours actifs',dAct,'var(--blue)']].map(([ic,lb,v,ac])=>`<div class="card" style="border-left:4px solid ${ac};padding:1.1rem"><div>${ic}</div><div style="font-size:1.7rem;font-weight:800;color:${ac}">${v}</div><div style="font-size:.78rem;color:var(--muted)">${lb}</div></div>`).join('')}
    </div>`;
}

// ── RECHERCHE ─────────────────────────────────────────
function rSearch(){
  const c=document.getElementById('ac');
  const q=_gq.trim().toLowerCase();
  const ar=q.length<2?[]:_appts.filter(a=>[a.id,a.driver_name,a.driver_phone,a.truck_plate,a.order_number,a.company_name,a.load_type,a.date].join(' ').toLowerCase().includes(q)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50);
  const ur=q.length<2?[]:_users.filter(u=>[u.first_name,u.last_name,u.email,u.company,u.phone,u.siret].join(' ').toLowerCase().includes(q));
  c.innerHTML=`
    <h2>Recherche globale</h2>
    <div class="card mb">
      <div class="flex gap" style="flex-wrap:wrap">
        <div class="srch" style="flex:1"><span class="srch-ico">🔍</span><input autofocus class="inp srch-inp" id="gs" value="${_gq}" placeholder="Référence, plaque, chauffeur, bon de commande, email…" style="font-size:1rem" oninput="_gq=this.value;rSearch()"/></div>
        <div class="flex gap-sm">${[['all','Tout'],['appts','RDV'],['users','Comptes']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_gt===v?'on':''}" onclick="_gt='${v}';rSearch()">${l}</button>`).join('')}</div>
      </div>
      ${q.length>=2?`<div class="muted mt">${ar.length+ur.length} résultat(s) — ${ar.length} RDV · ${ur.length} compte(s)</div>`:''}
    </div>
    ${q.length<2?'<div class="tc" style="padding:4rem;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🔍</div><p>Saisissez au moins 2 caractères…</p></div>':''}
    ${(_gt==='all'||_gt==='appts')&&ar.length>0?`<div class="mb"><h3 class="mb">📋 Rendez-vous (${ar.length})</h3>${ar.map(a=>{const sc=a.status==='cancelled'?'var(--red)':a.status==='waitlist'?'var(--orange)':'#27ae60';return`<div class="card card--b" style="border-left:4px solid ${sc};margin-bottom:.6rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;padding:.9rem 1.2rem"><span style="background:${sc};color:white;border-radius:6px;padding:.2rem .6rem;font-size:.8rem;font-weight:700">${a.slot.slice(0,5)}</span><div style="flex:1;min-width:200px"><div style="font-weight:700;color:var(--green)">${fmtDate(a.date)}</div><div style="font-size:.8rem;color:var(--sub)">👤 ${a.driver_name} · 🚛 ${a.truck_plate} · 🏢 ${a.company_name||'—'}</div></div><div style="font-size:.72rem;color:var(--muted);font-family:monospace">${a.id}</div></div>`;}).join('')}</div>`:''}
    ${(_gt==='all'||_gt==='users')&&ur.length>0?`<div><h3 class="mb">👥 Comptes (${ur.length})</h3>${ur.map(u=>`<div class="user-card"><div class="user-card__avatar" style="background:${u.role==='admin'?'var(--gold)':u.role==='driver'?'var(--blue)':'var(--mid)'}">${u.role==='admin'?'👑':'🚛'}</div><div class="user-card__info"><div class="user-card__name">${u.first_name} ${u.last_name} <span class="badge role-${u.role}" style="margin-left:.4rem">${u.role}</span></div><div class="user-card__sub">${u.email} · ${u.company}</div></div><span class="badge ${u.status==='active'?'badge--g':u.status==='pending'?'badge--o':'badge--r'}">${u.status==='active'?'✅':u.status==='pending'?'⏳':'🔴'}</span></div>`).join('')}</div>`:''}
    ${q.length>=2&&ar.length===0&&ur.length===0?`<div class="tc" style="padding:3rem;color:var(--muted)">Aucun résultat pour « ${_gq} »</div>`:''}`;
  document.getElementById('gs')?.focus();
}

// ── COMPTES ───────────────────────────────────────────
function rUsers(){
  const c=document.getElementById('ac');
  const filt=_users.filter(u=>_uf==='all'||u.status===_uf||u.role===_uf).filter(u=>!_us||[u.email,u.first_name,u.last_name,u.company].join(' ').toLowerCase().includes(_us.toLowerCase()));
  c.innerHTML=`
    <h2>Gestion des comptes</h2>
    <div class="card mb"><div class="flex gap" style="flex-wrap:wrap;align-items:center">
      <div class="srch" style="max-width:240px"><span class="srch-ico">🔍</span><input class="inp srch-inp" value="${_us}" placeholder="Rechercher…" oninput="_us=this.value;rUsers()"/></div>
      ${[['all','Tous'],['active','✅ Actifs'],['pending','⏳ En attente'],['disabled','🔴 Désactivés'],['admin','👑 Admins'],['transporter','🚛 Transporteurs'],['driver','🚗 Chauffeurs']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_uf===v?'on':''}" onclick="_uf='${v}';rUsers()">${l}</button>`).join('')}
    </div></div>
    <div>${filt.map(u=>`<div class="user-card" style="opacity:${u.status==='disabled'?.6:1}">
      <div class="user-card__avatar" style="background:${u.role==='admin'?'var(--gold)':u.role==='driver'?'var(--blue)':'var(--mid)'}">${u.role==='admin'?'👑':'🚛'}</div>
      <div class="user-card__info">
        <div class="user-card__name">${u.first_name} ${u.last_name} <span class="badge role-${u.role}" style="margin-left:.4rem">${u.role}</span></div>
        <div class="user-card__sub">${u.email} · ${u.phone} · ${u.company}</div>
        <div class="user-card__sub" style="font-size:.74rem">${u.address||''}</div>
      </div>
      <span class="badge ${u.status==='active'?'badge--g':u.status==='pending'?'badge--o':'badge--r'}">${u.status==='active'?'✅ Actif':u.status==='pending'?'⏳ En attente':'🔴 Désactivé'}</span>
      <div class="user-card__actions">
        ${u.status==='pending'?`<button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button>`:''}
        ${u.id!==_adm?.id?`<button class="btn btn--o btn--sm" onclick="toggleU('${u.id}')">${u.status==='active'?'Désactiver':'Réactiver'}</button>`:''}
        ${u.id!==_adm?.id?`<button class="btn btn--o btn--sm" onclick="delU('${u.id}')">🗑</button>`:''}
      </div>
    </div>`).join('')}</div>`;
}
async function approveU(id){const u=_users.find(x=>x.id===id);await SB.update('users',{id:`eq.${id}`},{status:'active'});if(u)Email.approved(u);_users=_users.map(x=>x.id===id?{...x,status:'active'}:x);_uf==='all'?rDash():rUsers();}
async function rejectU(id){if(!confirm('Refuser ce compte ?'))return;await SB.update('users',{id:`eq.${id}`},{status:'disabled'});_users=_users.map(x=>x.id===id?{...x,status:'disabled'}:x);rDash();}
async function toggleU(id){const u=_users.find(x=>x.id===id);const ns=u.status==='active'?'disabled':'active';await SB.update('users',{id:`eq.${id}`},{status:ns});_users=_users.map(x=>x.id===id?{...x,status:ns}:x);rUsers();}
async function delU(id){if(!confirm('Supprimer définitivement ce compte ?'))return;await SB.delete('users',{id:`eq.${id}`});_users=_users.filter(x=>x.id!==id);rUsers();}

// ── INVITATIONS ───────────────────────────────────────
function rInvites(){
  const c=document.getElementById('ac');
  const pending=_invites.filter(i=>i.status==='pending');
  const used=_invites.filter(i=>i.status==='used');
  const revoked=_invites.filter(i=>i.status==='revoked');
  const pendU=_users.filter(u=>u.status==='pending');
  c.innerHTML=`
    <h2>Invitations &amp; Approbations</h2>
    ${pendU.length>0?`<div class="card card--y mb" style="border:2px solid var(--orange)"><h3 style="color:var(--orange);margin-bottom:1rem">⏳ Approbations en attente (${pendU.length})</h3>${pendU.map(u=>`<div style="display:flex;align-items:center;gap:1rem;padding:.8rem 1rem;background:white;border-radius:8px;margin-bottom:.5rem;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div style="font-weight:700;color:var(--green)">${u.first_name} ${u.last_name} <span class="badge role-${u.role}" style="margin-left:.4rem">${u.role}</span></div><div style="font-size:.82rem;color:var(--sub)">${u.email} · ${u.company}</div><div style="font-size:.77rem;color:var(--muted)">📞 ${u.phone} · Inscrit le ${fmtDT(u.created_at)}</div></div><div class="flex gap-sm"><button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button><button class="btn btn--r btn--sm" onclick="rejectU('${u.id}')">❌ Refuser</button></div></div>`).join('')}</div>`:''}
    <div class="card mb">
      <h3 style="margin-bottom:.8rem">✉️ Inviter un transporteur</h3>
      <p style="color:var(--sub);font-size:.87rem;margin-bottom:1.2rem">Le destinataire reçoit un lien unique pour créer son compte. Il sera soumis à votre approbation avant activation.</p>
      <div id="inv-al"></div>
      <div class="fg">
        <div class="field"><label class="lbl">Email *</label><input class="inp" id="inv-em" type="email" placeholder="transporteur@example.com"/></div>
        <div class="field"><label class="lbl">Note interne</label><input class="inp" id="inv-no" placeholder="Transporteur espagnol, région Aragon…"/></div>
      </div>
      <button class="btn btn--p mt" onclick="sendInv()">✉️ Envoyer l'invitation</button>
    </div>
    <div class="g2">
      <div class="card"><h3 style="margin-bottom:1rem">📬 En attente (${pending.length})</h3>
        ${pending.length===0?'<p class="muted">Aucune invitation en attente</p>':
        pending.map(i=>`<div style="padding:.7rem .9rem;background:var(--g10);border-radius:8px;border:1px solid var(--g20);margin-bottom:.5rem"><div style="font-weight:600;color:var(--green)">${i.email}</div><div style="font-size:.78rem;color:var(--muted);margin-top:.1rem"><span class="badge role-${i.role}">${i.role}</span> · ${fmtDT(i.created_at)}</div>${i.note?`<div style="font-size:.78rem;color:var(--sub)">📝 ${i.note}</div>`:''}<div class="flex gap-sm mt"><code style="font-size:.7rem;background:var(--cream);padding:.15rem .4rem;border-radius:3px;color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis">${i.token?.slice(0,20)}…</code><button class="btn btn--r btn--sm" onclick="revokeInv('${i.id}')">Révoquer</button></div></div>`).join('')}
      </div>
      <div class="card"><h3 style="margin-bottom:1rem">✅ Utilisées (${used.length}) · 🚫 Révoquées (${revoked.length})</h3>
        ${[...used,...revoked].length===0?'<p class="muted">Aucun historique</p>':
        [...used,...revoked].sort((a,b)=>b.created_at.localeCompare(a.created_at)).map(i=>`<div style="padding:.6rem .8rem;background:${i.status==='used'?'var(--g10)':'var(--redbg)'};border-radius:7px;border:1px solid ${i.status==='used'?'var(--g20)':'var(--redbrd)'};display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem"><span>${i.status==='used'?'✅':'🚫'}</span><div><div style="font-weight:600;color:var(--green);font-size:.87rem">${i.email} <span class="badge role-${i.role}">${i.role}</span></div><div style="font-size:.73rem;color:var(--muted)">${fmtDT(i.created_at)}</div></div></div>`).join('')}
      </div>
    </div>`;
}
async function sendInv(){const em=document.getElementById('inv-em').value.trim(),no=document.getElementById('inv-no').value.trim(),al=document.getElementById('inv-al');try{const inv=await Auth.createInvitation(em,'transporter',_adm.id,no);await Email.inviteTransporter(em,inv.token,_adm,no);_invites.unshift({...inv,status:'pending'});al.innerHTML=`<div class="al al--s">✅ Invitation envoyée à ${em}</div>`;document.getElementById('inv-em').value='';document.getElementById('inv-no').value='';setTimeout(()=>rInvites(),2000);}catch(e){al.innerHTML=`<div class="al al--e">${e.message}</div>`;}}
async function revokeInv(id){await SB.update('invitations',{id:`eq.${id}`},{status:'revoked'});_invites=_invites.map(i=>i.id===id?{...i,status:'revoked'}:i);rInvites();}

// ── FERMETURES ────────────────────────────────────────
function rClosures(){
  const c=document.getElementById('ac');
  const upHol=[...HOLIDAYS].filter(d=>d>=todayStr()).sort().slice(0,8);
  c.innerHTML=`
    <h2>Fermetures exceptionnelles</h2>
    <div class="card mb"><h3 style="margin-bottom:1rem">✚ Ajouter une fermeture</h3>
      <div id="cl-al"></div>
      <div style="display:grid;grid-template-columns:1fr 2fr auto;gap:.8rem;align-items:end">
        <div class="field"><label class="lbl">Date</label><input class="inp" type="date" id="cl-d" min="${todayStr()}"/></div>
        <div class="field"><label class="lbl">Motif</label><input class="inp" id="cl-r" placeholder="Maintenance, congés, intempéries…"/></div>
        <button class="btn btn--p" onclick="addCl()">Ajouter</button>
      </div>
    </div>
    <div class="g2">
      <div class="card"><h3 style="margin-bottom:1rem">📅 Fermetures programmées (${_cl.length})</h3>
        ${_cl.length===0?'<p class="muted tc" style="padding:1.5rem">Aucune fermeture programmée</p>':
        _cl.map(cl=>`<div style="display:flex;align-items:center;gap:.8rem;padding:.7rem .9rem;background:var(--redbg);border-radius:8px;border:1px solid var(--redbrd);margin-bottom:.5rem"><strong style="color:var(--red);flex-shrink:0;font-size:.85rem">${fmtDate(cl.date)}</strong><span style="flex:1;color:var(--sub);font-size:.85rem">${cl.reason}</span><button class="btn btn--r btn--sm" onclick="delCl('${cl.id||cl.date}')">🗑</button></div>`).join('')}
      </div>
      <div class="card"><h3 style="margin-bottom:1rem">🎌 Prochains jours fériés</h3>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem">${upHol.map(d=>`<span style="background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;font-size:.79rem;color:var(--sub)">${fmtDate(d)}</span>`).join('')}</div>
      </div>
    </div>`;
}
async function addCl(){const d=document.getElementById('cl-d').value,r=document.getElementById('cl-r').value.trim(),al=document.getElementById('cl-al');if(!d||!r){al.innerHTML='<div class="al al--e">Date et motif requis.</div>';return;}if(_cl.find(c=>c.date===d)){al.innerHTML='<div class="al al--e">Cette date est déjà bloquée.</div>';return;}try{const row=await SB.insert('closures',{date:d,reason:r,created_by:_adm.id});_cl.push(Array.isArray(row)?row[0]:row);_cl.sort((a,b)=>a.date.localeCompare(b.date));rClosures();}catch(e){al.innerHTML=`<div class="al al--e">${e.message}</div>`;}}
async function delCl(id){if(!confirm('Supprimer cette fermeture ?'))return;try{await SB.delete('closures',{id:`eq.${id}`});_cl=_cl.filter(c=>c.id!==id);rClosures();}catch(e){alert(e.message);}}

// ── STATISTIQUES ──────────────────────────────────────
function rStats(){
  const c=document.getElementById('ac');
  const conf=_appts.filter(a=>a.status==='confirmed');
  const tonn=conf.reduce((s,a)=>s+parseFloat(a.tonnage||0),0);
  const byT={};LOAD_TYPES.forEach(lt=>{byT[lt]=conf.filter(a=>a.load_type===lt).length;});
  const maxT=Math.max(...Object.values(byT),1);
  const byCo={};conf.forEach(a=>{const k=a.company_name||'—';byCo[k]=(byCo[k]||0)+1;});
  const topCo=Object.entries(byCo).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxC=Math.max(...topCo.map(([,v])=>v),1);
  const weekly=Array.from({length:8},(_,i)=>{const dt=new Date();dt.setDate(dt.getDate()-(7-i)*7);const wd=getWeekDays(dt.toISOString().split('T')[0]);return{label:`S-${7-i}`,count:conf.filter(a=>wd.includes(a.date)).length};});
  const maxW=Math.max(...weekly.map(w=>w.count),1);
  c.innerHTML=`
    <h2>Statistiques</h2>
    <div class="g2 mb">
      <div class="card" style="border-left:4px solid var(--mid);padding:1.2rem"><div>📋</div><div style="font-size:2.2rem;font-weight:800;color:var(--mid)">${conf.length}</div><div style="font-size:.82rem;color:var(--muted)">RDV confirmés (total)</div></div>
      <div class="card" style="border-left:4px solid var(--gold);padding:1.2rem"><div>⚖️</div><div style="font-size:2.2rem;font-weight:800;color:var(--gold)">${tonn.toFixed(0)}T</div><div style="font-size:.82rem;color:var(--muted)">Tonnage total chargé</div></div>
    </div>
    <div class="g2 mb">
      <div class="card"><h3 class="mb">📦 Par type</h3>${LOAD_TYPES.map(lt=>`<div style="margin-bottom:.8rem"><div class="flex fxb" style="font-size:.84rem;margin-bottom:.3rem"><span style="color:var(--sub)">${lt}</span><strong style="color:var(--mid)">${byT[lt]||0}</strong></div><div style="height:8px;background:var(--cream);border-radius:4px"><div style="height:100%;width:${((byT[lt]||0)/maxT)*100}%;background:var(--mid);border-radius:4px"></div></div></div>`).join('')}</div>
      <div class="card"><h3 class="mb">🏆 Top transporteurs</h3>${topCo.length===0?'<p class="muted">Aucune donnée</p>':topCo.map(([co,count],i)=>`<div style="margin-bottom:.8rem"><div class="flex fxb" style="font-size:.84rem;margin-bottom:.3rem"><span style="color:var(--sub)">${i+1}. ${co}</span><strong style="color:var(--gold)">${count}</strong></div><div style="height:8px;background:var(--cream);border-radius:4px"><div style="height:100%;width:${(count/maxC)*100}%;background:var(--gold);border-radius:4px"></div></div></div>`).join('')}</div>
    </div>
    <div class="card"><h3 class="mb">📈 Activité 8 dernières semaines</h3>
      <div style="display:flex;align-items:flex-end;gap:.5rem;height:90px;padding:0 .5rem">
        ${weekly.map(({label,count})=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem"><span style="font-size:.7rem;color:var(--mid);font-weight:700;min-height:16px">${count>0?count:''}</span><div style="width:100%;background:${count>0?'var(--mid)':'var(--cream)'};border-radius:4px 4px 0 0;height:${Math.max((count/maxW)*65,3)}px"></div><span style="font-size:.68rem;color:var(--muted)">${label}</span></div>`).join('')}
      </div>
    </div>`;
}

// ── PARAMÈTRES ────────────────────────────────────────
function rSett(){
  const c=document.getElementById('ac');
  c.innerHTML=`
    <h2>Paramètres</h2>
    <div class="card" style="max-width:500px">
      <h3 class="mb">⚙️ Capacité journalière</h3>
      <div id="sal"></div>
      <div class="fg">
        <div class="field"><label class="lbl">Nb max camions / jour</label><input class="inp" type="number" id="s-tr" value="${_sett.maxTrucks||20}"/></div>
        <div class="field"><label class="lbl">Tonnage max / jour (T)</label><input class="inp" type="number" id="s-to" value="${_sett.maxTonnage||500}"/></div>
      </div>
      <div class="al al--i mt">ℹ️ Au-delà de la capacité, les nouveaux RDV sont automatiquement en liste d'attente.</div>
      <button class="btn btn--p mt" onclick="saveSett()">Enregistrer</button>
    </div>`;
}
async function saveSett(){
  await SB.update('settings',{key:'eq.max_trucks_per_day'},{value:document.getElementById('s-tr').value});
  await SB.update('settings',{key:'eq.max_tonnage_per_day'},{value:document.getElementById('s-to').value});
  _sett={maxTrucks:parseInt(document.getElementById('s-tr').value),maxTonnage:parseInt(document.getElementById('s-to').value)};
  showAlert(document.getElementById('sal'),'✅ Paramètres sauvegardés !','success');
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
