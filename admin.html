<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Administration — Sojalim RDV</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1a3a2a"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb__brand">
      <img src="img/logo.svg" alt="Sojalim" style="height:32px;filter:brightness(0) invert(1);opacity:.85;display:block;margin-bottom:.4rem"/>
      <div class="sb__sub" id="aname">Administrateur</div>
    </div>
    <nav class="sb__nav">
      <button class="sb__lnk on" onclick="gt('dash')"      id="n-dash">🏠 Tableau de bord</button>
      <button class="sb__lnk"   onclick="gt('plan')"      id="n-plan">📅 Planning</button>
      <button class="sb__lnk"   onclick="gt('cal')"       id="n-cal">📆 Calendrier</button>
      <button class="sb__lnk"   onclick="gt('search')"    id="n-search">🔍 Recherche</button>
      <button class="sb__lnk"   onclick="gt('users')"     id="n-users">👥 Comptes</button>
      <button class="sb__lnk"   onclick="gt('invites')"   id="n-invites">✉️ Invitations</button>
      <button class="sb__lnk"   onclick="gt('incidents')" id="n-incidents">⚠️ Incidents</button>
      <button class="sb__lnk"   onclick="gt('logs')"      id="n-logs">🔐 Connexions</button>
      <button class="sb__lnk"   onclick="gt('notes')"     id="n-notes">📝 Notes</button>
      <button class="sb__lnk"   onclick="gt('closures')"  id="n-closures">🚫 Fermetures</button>
      <button class="sb__lnk"   onclick="gt('stats')"     id="n-stats">📊 Statistiques</button>
      <button class="sb__lnk"   onclick="gt('sett')"      id="n-sett">⚙️ Paramètres</button>
    </nav>
    <div class="sb__foot">
      <button class="btn btn--gh btn--sm" onclick="Auth.logout()" style="width:100%;border-radius:8px">🔒 Déconnexion</button>
    </div>
  </aside>
  <main class="main"><div class="content" id="ac"><div class="loader"><div class="spinner"></div></div></div></main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/email.js"></script>
<script src="js/rdv.js"></script>
<script>
let _adm=null,_appts=[],_cl=[],_users=[],_sett={},_invites=[],_incidents=[],_scores=[];
let _tab='dash',_pd=todayStr(),_pf='all',_ps='';
let _cy=new Date().getFullYear(),_cm=new Date().getMonth();
let _gq='',_gt='all',_uf='all',_us='';

async function init(){
  _adm=Auth.require(['admin']);if(!_adm)return;
  document.getElementById('aname').textContent='Connecté : '+_adm.first_name;
  await reload();gt('dash');
}

async function reload(){
  const[a,c,u,s,i,inc,sc]=await Promise.all([
    RDV.getAllAppts().catch(()=>[]),
    RDV.getClosures().catch(()=>[]),
    SB.select('users',{select:'id,email,role,first_name,last_name,company,phone,siret,address,status,parent_id,last_login,created_at',order:'created_at.desc'}).catch(()=>[]),
    RDV.getSettings().catch(()=>({maxTrucks:20})),
    SB.select('invitations',{select:'*',order:'created_at.desc'}).catch(()=>[]),
    RDV.getAllIncidents().catch(()=>[]),
    RDV.getAllScores().catch(()=>[]),
  ]);
  _appts=a;_cl=c;_users=u||[];_sett=s;_invites=i||[];_incidents=inc||[];_scores=sc||[];
}

function gt(tab){
  _tab=tab;
  document.querySelectorAll('.sb__lnk').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('n-'+tab);if(nb)nb.classList.add('on');
  document.getElementById('ac').innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const fns={dash:rDash,plan:rPlan,cal:rCal,search:rSearch,users:rUsers,invites:rInvites,incidents:rIncidents,logs:rLogs,notes:rNotes,closures:rClosures,stats:rStats,sett:rSett};
  setTimeout(()=>{if(fns[tab])fns[tab]();},40);
}

// ── DASHBOARD ──────────────────────────────────────────
function rDash(){
  const c=document.getElementById('ac'),now=todayStr();
  const todayOk=_appts.filter(a=>a.date===now&&a.status==='confirmed');
  const yr=new Date().getFullYear();
  const yrOk=_appts.filter(a=>a.status==='confirmed'&&a.date?.startsWith(String(yr)));
  const wl=_appts.filter(a=>a.status==='waitlist');
  const tonn=todayOk.reduce((s,a)=>s+parseFloat(a.tonnage||0),0);
  const pendU=_users.filter(u=>u.status==='pending');
  const dangerScores=_scores.filter(s=>s.alert_level==='danger');
  const warnScores=_scores.filter(s=>s.alert_level==='warning');
  c.innerHTML=`
    <h2>Tableau de bord</h2>
    <div class="g3 mb">
      ${[['📅','RDV aujourd\'hui',todayOk.length,'#27ae60'],['⚖️','Tonnage aujourd\'hui',tonn.toFixed(0)+'T','var(--gold)'],['⏳','Liste d\'attente',wl.length,'var(--orange)'],['🚛','RDV cette année',yrOk.length,'var(--blue)'],['👥','Transporteurs actifs',_users.filter(u=>u.role==='transporter'&&u.status==='active').length,'var(--mid)'],['🔴','En attente approbation',pendU.length,'var(--red)']].map(([ic,lb,val,ac])=>`
    <div class="card" style="border-left:4px solid ${ac};padding:1.2rem">
      <div style="font-size:1.3rem">${ic}</div>
      <div style="font-size:2rem;font-weight:800;color:${ac};line-height:1.1;margin-top:.1rem">${val}</div>
      <div style="font-size:.78rem;color:var(--muted)">${lb}</div>
    </div>`).join('')}
    </div>
    ${dangerScores.length>0?`
    <div class="card card--r mb" style="border:2px solid var(--red)">
      <h3 style="color:var(--red);margin-bottom:.8rem">🔴 Transporteurs en alerte critique (${dangerScores.length})</h3>
      ${dangerScores.map(s=>`<div style="display:flex;align-items:center;gap:1rem;padding:.7rem 1rem;background:white;border-radius:8px;margin-bottom:.4rem;flex-wrap:wrap">
        <div style="flex:1"><div style="font-weight:700;color:var(--green)">${s.first_name} ${s.last_name} — ${s.company}</div><div style="font-size:.8rem;color:var(--sub)">${s.email}</div></div>
        <span class="penalty-badge danger">⚠️ ${s.total_penalty} points</span>
        <div class="flex gap-sm">
          <button class="btn btn--r btn--sm" onclick="gt('incidents')">Gérer</button>
          <button class="btn btn--o btn--sm" onclick="suspendUser('${s.id}')">Suspendre</button>
        </div>
      </div>`).join('')}
    </div>`:''}
    ${warnScores.length>0?`
    <div class="card card--y mb">
      <h3 style="color:var(--orange);margin-bottom:.8rem">🟠 Avertissements (${warnScores.length})</h3>
      ${warnScores.map(s=>`<div style="display:flex;align-items:center;gap:1rem;padding:.6rem .9rem;background:white;border-radius:8px;margin-bottom:.35rem;flex-wrap:wrap">
        <div style="flex:1"><div style="font-weight:700;color:var(--green)">${s.first_name} ${s.last_name} — ${s.company}</div></div>
        <span class="penalty-badge warning">🟠 ${s.total_penalty} points</span>
      </div>`).join('')}
    </div>`:''}
    ${pendU.length>0?`
    <div class="card card--y mb" style="border:2px solid var(--orange)">
      <h3 style="color:var(--orange);margin-bottom:.8rem">⏳ Approbations en attente (${pendU.length})</h3>
      ${pendU.map(u=>`<div style="display:flex;align-items:center;gap:1rem;padding:.7rem 1rem;background:white;border-radius:8px;margin-bottom:.4rem;flex-wrap:wrap">
        <div style="flex:1"><div style="font-weight:700;color:var(--green)">${u.first_name} ${u.last_name} — ${u.company}</div>
        <div style="font-size:.8rem;color:var(--sub)">${u.email} · ${u.phone} · <span class="badge role-${u.role}">${u.role}</span></div></div>
        <div class="flex gap-sm"><button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button><button class="btn btn--r btn--sm" onclick="rejectU('${u.id}')">❌ Refuser</button></div>
      </div>`).join('')}
    </div>`:''}
    <div class="card">
      <div class="section-hdr"><h3 style="margin:0">Planning du jour — ${fmtDate(now)}</h3><button class="btn btn--o btn--sm" onclick="gt('plan')">Voir complet →</button></div>
      ${todayOk.length===0?'<p class="muted tc" style="padding:2rem">Aucun rendez-vous aujourd\'hui</p>':
      `<div style="display:flex;flex-direction:column;gap:.35rem;margin-top:.8rem">
        ${todayOk.sort((a,b)=>a.slot.localeCompare(b.slot)).map(a=>`
        <div style="display:flex;gap:.8rem;align-items:center;padding:.55rem .9rem;background:var(--g10);border-radius:8px;flex-wrap:wrap">
          <strong style="color:var(--mid);min-width:48px">${a.slot.slice(0,5)}</strong>
          <span style="flex:1;font-weight:600;font-size:.9rem">${a.driver_name}</span>
          <span style="color:var(--sub);font-size:.83rem">${a.company_name}</span>
          <span style="color:var(--sub);font-size:.83rem">${a.truck_plate}</span>
          <span style="color:var(--muted);font-size:.8rem">${a.load_type} · ${a.tonnage}T</span>
        </div>`).join('')}
      </div>`}
    </div>`;
}

// ── PLANNING ───────────────────────────────────────────
function rPlan(){
  const c=document.getElementById('ac');
  const da=_appts.filter(a=>a.date===_pd);
  const filt=da.filter(a=>_pf==='all'||a.status===_pf).filter(a=>!_ps||[a.driver_name,a.company_name,a.truck_plate,a.order_number,a.id].join(' ').toLowerCase().includes(_ps.toLowerCase())).sort((a,b)=>a.slot.localeCompare(b.slot));
  const confToday=da.filter(a=>a.status==='confirmed');
  c.innerHTML=`
    <div class="section-hdr"><h2>Planning</h2>
      <div class="flex gap-sm">
        <button class="btn btn--g btn--sm" onclick="exportPlanningPDF('${_pd}')">📄 Export PDF</button>
        <button class="btn btn--o btn--sm" onclick="printPlan()">🖨 Impression rapide</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:255px 1fr;gap:1.2rem;align-items:start">
      <div class="card">
        <div class="flex fxb" style="margin-bottom:.8rem">
          <button class="btn btn--o btn--sm" onclick="navD(-1)">◀</button>
          <input type="date" id="pd" value="${_pd}" style="border:none;font-weight:700;color:var(--green);font-size:.86rem;cursor:pointer;outline:none;font-family:inherit;text-align:center" onchange="_pd=this.value;rPlan()"/>
          <button class="btn btn--o btn--sm" onclick="navD(1)">▶</button>
        </div>
        ${!isDayOpen(_pd,_cl)?'<div class="al al--e" style="font-size:.77rem;padding:.4rem .7rem">⛔ Jour non ouvrable</div>':''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.3rem;margin-bottom:.8rem">
          ${SLOTS.map(s=>{const a=da.find(d=>d.slot.slice(0,5)===s&&d.status!=='cancelled');return`<button style="padding:.45rem .35rem;border-radius:6px;border:1.5px solid ${a?'var(--g20)':'var(--border)'};background:${a?'var(--g10)':'white'};color:${a?'var(--mid)':'var(--muted)'};font-size:.76rem;font-weight:600;cursor:pointer;font-family:inherit">${s}${a?' ✓':''}</button>`;}).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem">
          ${[['✅',confToday.length,'#27ae60'],['⏳',da.filter(a=>a.status==='waitlist').length,'var(--orange)'],['❌',da.filter(a=>a.status==='cancelled').length,'var(--red)'],['⚖️',confToday.reduce((s,a)=>s+parseFloat(a.tonnage||0),0).toFixed(0)+'T','var(--gold)']].map(([ic,v,col])=>`<div style="border:1px solid var(--border);border-radius:6px;padding:.45rem;text-align:center"><div>${ic}</div><div style="font-size:1rem;font-weight:800;color:${col}">${v}</div></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="section-hdr" style="margin-bottom:.9rem">
          <h3 style="margin:0">Rendez-vous (${filt.length})</h3>
          <div class="flex gap-sm" style="flex-wrap:wrap">${[['all','Tous'],['confirmed','✅'],['waitlist','⏳'],['cancelled','❌']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_pf===v?'on':''}" onclick="_pf='${v}';rPlan()">${l}</button>`).join('')}</div>
        </div>
        <div class="srch mb"><span class="srch-ico">🔍</span><input class="inp srch-inp" value="${_ps}" placeholder="Chauffeur, plaque, BC, référence…" oninput="_ps=this.value;rPlan()"/></div>
        ${filt.length===0?'<p class="muted tc" style="padding:1.5rem">Aucun rendez-vous</p>':filt.map(a=>aRow(a)).join('')}
      </div>
    </div>`;
}

function aRow(a){
  const xx=a.status==='cancelled',wl=a.status==='waitlist';
  const sc=xx?'var(--red)':wl?'var(--orange)':'#27ae60';
  const did='ar'+a.id.replace(/[^a-z0-9]/gi,'');
  const transpScore=_scores.find(s=>s.id===a.transporter_id);
  return`<div style="border:1.5px solid ${xx?'#fde8e8':wl?'#fff3cd':'var(--g20)'};border-radius:9px;overflow:hidden;margin-bottom:.55rem">
    <div onclick="toggleDetail('${did}')" style="display:flex;align-items:center;padding:.65rem 1rem;gap:.8rem;cursor:pointer;background:${xx?'var(--redbg)':wl?'#fffdf0':'var(--g10)'}">
      <div style="background:${sc};color:white;border-radius:6px;padding:.22rem .6rem;font-size:.78rem;font-weight:700;flex-shrink:0">${a.slot.slice(0,5)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:var(--green);font-size:.88rem">${a.driver_name} <span style="color:var(--muted);font-weight:400;font-size:.82rem">— ${a.company_name||'—'}</span>
          ${transpScore?.alert_level==='danger'?'<span class="badge badge--r" style="margin-left:.4rem">⚠️ Alerte</span>':transpScore?.alert_level==='warning'?'<span class="badge badge--o" style="margin-left:.4rem">🟠</span>':''}
        </div>
        <div style="font-size:.76rem;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🚛 ${a.truck_plate} · 📞 ${a.driver_phone||'—'} · 🫘 ${a.load_type} · ⚖️ ${a.tonnage}T</div>
      </div>
      <span style="font-size:.7rem;color:var(--muted);font-family:monospace;flex-shrink:0">${a.id}</span>
      <span style="color:var(--muted)">▼</span>
    </div>
    <div id="${did}" style="display:none;padding:.85rem 1.1rem;background:white;border-top:1px solid var(--border)">
      <div class="appt__grid" style="margin-bottom:.85rem">
        ${[['Chauffeur',a.driver_name],['Tél.',a.driver_phone||'—'],['Plaque',a.truck_plate],['Chargement',a.load_type],['Tonnage',a.tonnage+'T'],['Bon de cmd',a.order_number],['Société',a.company_name||'—'],['Notes',a.notes||'—'],['Créé le',fmtDT(a.created_at)]].map(([l,v])=>`<div><span class="df__l">${l}</span><span class="df__v">${v}</span></div>`).join('')}
      </div>
      <div class="flex gap-sm" style="flex-wrap:wrap">
        ${wl?`<button class="btn btn--o btn--sm" onclick="promoteA('${a.id}')">⬆️ Confirmer</button>`:''}
        ${!xx?`<button class="btn btn--r btn--sm" onclick="cancelA('${a.id}')">❌ Annuler</button>`:`<button class="btn btn--o btn--sm" onclick="restoreA('${a.id}')">✅ Restaurer</button>`}
        ${!xx&&a.user_id?`<button class="btn btn--blue btn--sm" onclick="remindA('${a.id}')">📨 Rappel</button>`:''}
        ${!xx&&a.transporter_id?`<button class="btn btn--sm" style="background:#fff8e6;color:var(--orange);border:1px solid #ffe082" onclick="showIncForm('${a.id}','${a.transporter_id}','${did}')">⚠️ Incident</button>`:''}
        <button class="btn btn--o btn--sm" onclick="delA('${a.id}')">🗑</button>
      </div>
      <div id="inc-form-${did}" style="display:none;margin-top:.8rem"></div>
    </div>
  </div>`;
}

function showIncForm(apptId,userId,did){
  const el=document.getElementById('inc-form-'+did);if(!el)return;
  el.style.display='block';
  el.innerHTML=`
    <div class="card card--y" style="margin-top:.5rem">
      <h3 style="margin-bottom:.8rem;color:var(--orange)">⚠️ Signaler un incident</h3>
      <div class="fg">
        <div class="field"><label class="lbl">Type *</label>
          <select class="sel" id="it-${did}" onchange="updPen('${did}')">
            <option value="no_show">🚫 Non-présentation (2 pts)</option>
            <option value="late">⏰ Retard (0.5–1 pt)</option>
            <option value="partial_load">📦 Chargement incomplet (0.5 pt)</option>
            <option value="other">📝 Autre</option>
          </select>
        </div>
        <div class="field" id="lm-${did}"><label class="lbl">Retard (minutes)</label><input class="inp" type="number" id="ilm-${did}" value="0" min="0" onchange="updPen('${did}')"/></div>
        <div class="field"><label class="lbl">Points de pénalité</label><input class="inp" type="number" id="ip-${did}" value="2" step="0.5" min="0"/></div>
        <div class="field"><label class="lbl">Note / Commentaire</label><input class="inp" id="in-${did}" placeholder="Détails…"/></div>
      </div>
      <div class="flex gap-sm mt">
        <button class="btn btn--p btn--sm" onclick="submitInc('${apptId}','${userId}','${did}')">✅ Enregistrer et notifier</button>
        <button class="btn btn--o btn--sm" onclick="document.getElementById('inc-form-${did}').style.display='none'">Annuler</button>
      </div>
    </div>`;
  document.getElementById('lm-'+did).style.display='none';
}

function updPen(did){
  const type=document.getElementById('it-'+did)?.value;
  const late=parseInt(document.getElementById('ilm-'+did)?.value||'0');
  const lw=document.getElementById('lm-'+did);
  const pe=document.getElementById('ip-'+did);
  if(lw)lw.style.display=type==='late'?'':'none';
  let pen=type==='no_show'?2:type==='late'?(late>=60?1:0.5):type==='partial_load'?0.5:0;
  if(pe)pe.value=pen;
}

async function submitInc(apptId,userId,did){
  const type=document.getElementById('it-'+did)?.value;
  const late=parseInt(document.getElementById('ilm-'+did)?.value||'0');
  const pen=parseFloat(document.getElementById('ip-'+did)?.value||'0');
  const note=document.getElementById('in-'+did)?.value.trim();
  try{
    const inc=await RDV.addIncident(apptId,userId,type,late,note,pen,_adm.id);
    const user=_users.find(u=>u.id===userId);
    const score=await RDV.getUserScore(userId);
    if(user)await Email.penalty(user,{...inc,appointment_id:apptId,total_penalty:score?.total_penalty||pen});
    document.getElementById('inc-form-'+did).style.display='none';
    await reload();
    alert(`✅ Incident enregistré.${user?' '+user.first_name+' a été notifié par email.':''}`);
    rPlan();
  }catch(e){alert('Erreur : '+e.message);}
}

function navD(d){const dt=new Date(_pd+'T12:00:00');dt.setDate(dt.getDate()+d);while(dt.getDay()===0||dt.getDay()===6)dt.setDate(dt.getDate()+d);_pd=dt.toISOString().split('T')[0];rPlan();}
async function cancelA(id){if(!confirm('Annuler ?'))return;await RDV.cancel(id);_appts=_appts.map(a=>a.id===id?{...a,status:'cancelled'}:a);rPlan();}
async function restoreA(id){await RDV.updateStatus(id,'confirmed');_appts=_appts.map(a=>a.id===id?{...a,status:'confirmed'}:a);rPlan();}
async function promoteA(id){await RDV.updateStatus(id,'confirmed');_appts=_appts.map(a=>a.id===id?{...a,status:'confirmed'}:a);rPlan();}
async function delA(id){if(!confirm('Supprimer définitivement ?'))return;await RDV.deleteAppt(id);_appts=_appts.filter(a=>a.id!==id);rPlan();}
async function remindA(id){const a=_appts.find(x=>x.id===id);const u=_users.find(x=>x.id===a?.user_id);if(u&&a)await Email.reminder(u,a);alert('📨 Rappel envoyé !');}
function printPlan(){const da=_appts.filter(a=>a.date===_pd&&a.status!=='cancelled').sort((a,b)=>a.slot.localeCompare(b.slot));const rows=da.map(a=>`${a.slot.slice(0,5)}–${addMins(a.slot.slice(0,5),30)}  |  ${a.driver_name}  |  ${a.driver_phone||'—'}  |  ${a.truck_plate}  |  ${a.load_type}  |  ${a.tonnage}T  |  ${a.order_number}`).join('\n');const w=window.open('','_blank');w.document.write(`<html><body><pre style="font-family:monospace;padding:2rem;font-size:13px"><h2>Planning Sojalim — ${fmtDate(_pd)}</h2><hr>\n${rows||'Aucun rendez-vous'}\n\nTotal : ${da.filter(a=>a.status==='confirmed').length} RDV · ${da.reduce((s,a)=>s+parseFloat(a.tonnage||0),0).toFixed(0)}T</pre></body></html>`);w.print();}

// ── CALENDRIER ─────────────────────────────────────────
function rCal(){
  const c=document.getElementById('ac');
  const mnames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dn=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const first=new Date(_cy,_cm,1),last=new Date(_cy,_cm+1,0);
  const startDow=(first.getDay()||7)-1;
  const cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=last.getDate();d++)cells.push(new Date(_cy,_cm,d));
  const maxT=_sett.maxTrucks||20,now=todayStr();
  const ms=`${_cy}-${String(_cm+1).padStart(2,'0')}`;
  const mOk=_appts.filter(a=>a.status==='confirmed'&&a.date?.startsWith(ms));
  c.innerHTML=`
    <h2>Calendrier mensuel</h2>
    <div class="flex fxb mb" style="flex-wrap:wrap;gap:1rem">
      <div class="flex fxc gap"><button class="btn btn--o" onclick="_cm--;if(_cm<0){_cm=11;_cy--;}rCal()">◀</button><h3 style="min-width:190px;text-align:center;margin:0">${mnames[_cm]} ${_cy}</h3><button class="btn btn--o" onclick="_cm++;if(_cm>11){_cm=0;_cy++;}rCal()">▶</button></div>
    </div>

      <div class="cal-grid">
        ${cells.map(d=>{
          if(!d)return'<div class="cal-cell empty"></div>';
          const ds=d.toISOString().split('T')[0];
          const da=_appts.filter(a=>a.date===ds&&a.status!=='cancelled');
          const conf=da.filter(a=>a.status==='confirmed').length;
          const wl=da.filter(a=>a.status==='waitlist').length;
          const isH=HOLIDAYS.has(ds),isC=!!_cl.find(cl=>cl.date===ds),isW=d.getDay()===0||d.getDay()===6,isT=ds===now,isFull=conf>=maxT;
          const cls=['cal-cell',isT?'today':'',isH||isC||isW?'closed':isFull?'full':conf>0?'has':''].join(' ');
          return`<div class="${cls}" onclick="${!isW&&!isH&&!isC?`_pd='${ds}';gt('plan')`:''}">
            <div class="cal-num ${isW||isH||isC?'cl':''} ${isT?'td':''}">${d.getDate()}</div>
            ${!isW&&!isH&&!isC&&conf>0?`<div class="cal-cnt">🚛 ${conf}/${maxT}</div>`:''}
            ${wl>0?`<div style="font-size:.66rem;color:var(--orange)">⏳${wl}</div>`:''}
            ${!isW&&!isH&&!isC&&conf>0?`<div class="cal-bar"><div class="cal-fill ${conf/maxT>=1?'or':''}" style="width:${Math.min(conf/maxT,1)*100}%"></div></div>`:''}
            ${isH?'<div style="font-size:.62rem;color:var(--red)">Férié</div>':''}
            ${isC?'<div style="font-size:.62rem;color:var(--red)">Fermé</div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="g3 mt">
      ${[['🚛','RDV ce mois',mOk.length,'var(--mid)'],['⚖️','Tonnage',mOk.reduce((s,a)=>s+parseFloat(a.tonnage||0),0).toFixed(0)+'T','var(--gold)'],['📅','Jours actifs',new Set(mOk.map(a=>a.date)).size,'var(--blue)']].map(([ic,lb,v,ac])=>`<div class="card" style="border-left:4px solid ${ac};padding:1rem"><div>${ic}</div><div style="font-size:1.6rem;font-weight:800;color:${ac}">${v}</div><div style="font-size:.76rem;color:var(--muted)">${lb}</div></div>`).join('')}
    </div>`;
}

// ── RECHERCHE ──────────────────────────────────────────
function rSearch(){
  const c=document.getElementById('ac');
  const q=_gq.trim().toLowerCase();
  const ar=q.length<2?[]:_appts.filter(a=>[a.id,a.driver_name,a.driver_phone,a.truck_plate,a.order_number,a.company_name,a.date].join(' ').toLowerCase().includes(q)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50);
  const ur=q.length<2?[]:_users.filter(u=>[u.first_name,u.last_name,u.email,u.company,u.phone].join(' ').toLowerCase().includes(q));
  c.innerHTML=`
    <h2>Recherche globale</h2>
    <div class="card mb">
      <div class="flex gap" style="flex-wrap:wrap">
        <div class="srch" style="flex:1"><span class="srch-ico">🔍</span><input class="inp srch-inp" id="gs" value="${_gq}" placeholder="Référence, plaque, chauffeur, email…" oninput="_gq=this.value;rSearch()"/></div>
        <div class="flex gap-sm">${[['all','Tout'],['appts','RDV'],['users','Comptes']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_gt===v?'on':''}" onclick="_gt='${v}';rSearch()">${l}</button>`).join('')}</div>
      </div>
      ${q.length>=2?`<div class="muted mt">${ar.length+ur.length} résultat(s)</div>`:''}
    </div>
    ${q.length<2?'<div class="tc" style="padding:4rem;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🔍</div><p>Saisissez au moins 2 caractères…</p></div>':''}
    ${(_gt==='all'||_gt==='appts')&&ar.length>0?`<div class="mb"><h3 class="mb">📋 Rendez-vous (${ar.length})</h3>${ar.map(a=>{const sc=a.status==='cancelled'?'var(--red)':a.status==='waitlist'?'var(--orange)':'#27ae60';return`<div class="card card--b" style="border-left:4px solid ${sc};margin-bottom:.5rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;padding:.85rem 1.1rem"><span style="background:${sc};color:white;border-radius:6px;padding:.2rem .55rem;font-size:.78rem;font-weight:700">${a.slot.slice(0,5)}</span><div style="flex:1"><div style="font-weight:700;color:var(--green)">${fmtDate(a.date)}</div><div style="font-size:.78rem;color:var(--sub)">👤 ${a.driver_name} · 🚛 ${a.truck_plate} · 🏢 ${a.company_name||'—'}</div></div><div style="font-size:.7rem;color:var(--muted);font-family:monospace">${a.id}</div></div>`;}).join('')}</div>`:''}
    ${(_gt==='all'||_gt==='users')&&ur.length>0?`<div><h3 class="mb">👥 Comptes (${ur.length})</h3>${ur.map(u=>{const score=_scores.find(s=>s.id===u.id);return`<div class="user-card"><div class="user-card__avatar" style="background:${u.role==='admin'?'var(--gold)':u.role==='driver'?'var(--blue)':'var(--mid)'}">${u.role==='admin'?'👑':'🚛'}</div><div class="user-card__info"><div class="user-card__name">${u.first_name} ${u.last_name} <span class="badge role-${u.role}">${u.role}</span>${score?.alert_level==='danger'?'<span class="badge badge--r" style="margin-left:.3rem">⚠️</span>':score?.alert_level==='warning'?'<span class="badge badge--o" style="margin-left:.3rem">🟠</span>':''}</div><div class="user-card__sub">${u.email} · ${u.company}</div></div><span class="badge ${u.status==='active'?'badge--g':u.status==='pending'?'badge--o':'badge--r'}">${u.status==='active'?'✅':u.status==='pending'?'⏳':'🔴'}</span></div>`;}).join('')}</div>`:''}
    ${q.length>=2&&ar.length===0&&ur.length===0?`<div class="tc" style="padding:3rem;color:var(--muted)">Aucun résultat pour « ${_gq} »</div>`:''}`;
  document.getElementById('gs')?.focus();
}

// ── COMPTES ────────────────────────────────────────────
function rUsers(){
  const c=document.getElementById('ac');
  const filt=_users.filter(u=>_uf==='all'||u.status===_uf||u.role===_uf).filter(u=>!_us||[u.email,u.first_name,u.last_name,u.company].join(' ').toLowerCase().includes(_us.toLowerCase()));
  c.innerHTML=`
    <h2>Gestion des comptes</h2>
    <div class="card mb"><div class="flex gap" style="flex-wrap:wrap;align-items:center">
      <div class="srch" style="max-width:240px"><span class="srch-ico">🔍</span><input class="inp srch-inp" value="${_us}" placeholder="Rechercher…" oninput="_us=this.value;rUsers()"/></div>
      ${[['all','Tous'],['active','✅ Actifs'],['pending','⏳ En attente'],['disabled','🔴 Désactivés'],['admin','👑 Admins'],['transporter','🚛 Transporteurs'],['driver','🚗 Chauffeurs']].map(([v,l])=>`<button class="btn btn--pill btn--o ${_uf===v?'on':''}" onclick="_uf='${v}';rUsers()">${l}</button>`).join('')}
    </div></div>
    <div>${filt.map(u=>{
      const score=_scores.find(s=>s.id===u.id);
      return`<div class="user-card" style="opacity:${u.status==='disabled'?.6:1}">
        <div class="user-card__avatar" style="background:${u.role==='admin'?'var(--gold)':u.role==='driver'?'var(--blue)':'var(--mid)'}">${u.role==='admin'?'👑':'🚛'}</div>
        <div class="user-card__info">
          <div class="user-card__name">${u.first_name} ${u.last_name} <span class="badge role-${u.role}">${u.role}</span>
            ${score?.alert_level==='danger'?`<span class="penalty-badge danger" style="margin-left:.4rem">⚠️ ${score.total_penalty}pts</span>`:score?.alert_level==='warning'?`<span class="penalty-badge warning" style="margin-left:.4rem">🟠 ${score.total_penalty}pts</span>`:''}
          </div>
          <div class="user-card__sub">${u.email} · ${u.phone} · ${u.company}</div>
        </div>
        <span class="badge ${u.status==='active'?'badge--g':u.status==='pending'?'badge--o':'badge--r'}">${u.status==='active'?'✅ Actif':u.status==='pending'?'⏳ En attente':'🔴 Désactivé'}</span>
        <div class="user-card__actions">
          ${u.status==='pending'?`<button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button>`:''}
          ${u.id!==_adm?.id?`<button class="btn btn--o btn--sm" onclick="toggleU('${u.id}')">${u.status==='active'?'Désactiver':'Réactiver'}</button>`:''}
          ${u.id!==_adm?.id?`<button class="btn btn--o btn--sm" onclick="delU('${u.id}')">🗑</button>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;
}
async function approveU(id){const u=_users.find(x=>x.id===id);await SB.update('users',{id:`eq.${id}`},{status:'active'});if(u)Email.approved(u);_users=_users.map(x=>x.id===id?{...x,status:'active'}:x);_tab==='users'?rUsers():rDash();}
async function rejectU(id){if(!confirm('Refuser ce compte ?'))return;await SB.update('users',{id:`eq.${id}`},{status:'disabled'});_users=_users.map(x=>x.id===id?{...x,status:'disabled'}:x);rDash();}
async function toggleU(id){const u=_users.find(x=>x.id===id);const ns=u.status==='active'?'disabled':'active';await SB.update('users',{id:`eq.${id}`},{status:ns});_users=_users.map(x=>x.id===id?{...x,status:ns}:x);rUsers();}
async function suspendUser(id){if(!confirm('Suspendre ce compte ?'))return;await SB.update('users',{id:`eq.${id}`},{status:'disabled'});_users=_users.map(x=>x.id===id?{...x,status:'disabled'}:x);await reload();rDash();}
async function delU(id){if(!confirm('Supprimer définitivement ?'))return;await SB.delete('users',{id:`eq.${id}`});_users=_users.filter(x=>x.id!==id);rUsers();}

// ── INVITATIONS ────────────────────────────────────────
function rInvites(){
  const c=document.getElementById('ac');
  const pending=_invites.filter(i=>i.status==='pending');
  const used=_invites.filter(i=>i.status==='used');
  const revoked=_invites.filter(i=>i.status==='revoked');
  const pendU=_users.filter(u=>u.status==='pending');
  c.innerHTML=`
    <h2>Invitations &amp; Approbations</h2>
    ${pendU.length>0?`<div class="card card--y mb" style="border:2px solid var(--orange)"><h3 style="color:var(--orange);margin-bottom:.8rem">⏳ Approbations en attente (${pendU.length})</h3>
    ${pendU.map(u=>`<div style="display:flex;align-items:center;gap:1rem;padding:.7rem 1rem;background:white;border-radius:8px;margin-bottom:.4rem;flex-wrap:wrap"><div style="flex:1"><div style="font-weight:700;color:var(--green)">${u.first_name} ${u.last_name} <span class="badge role-${u.role}">${u.role}</span></div><div style="font-size:.8rem;color:var(--sub)">${u.email} · ${u.company}</div><div style="font-size:.75rem;color:var(--muted)">📞 ${u.phone} · ${fmtDT(u.created_at)}</div></div><div class="flex gap-sm"><button class="btn btn--p btn--sm" onclick="approveU('${u.id}')">✅ Approuver</button><button class="btn btn--r btn--sm" onclick="rejectU('${u.id}')">❌ Refuser</button></div></div>`).join('')}
    </div>`:''}
    <div class="card mb">
      <h3 style="margin-bottom:.7rem">✉️ Inviter un transporteur</h3>
      <div id="inv-al"></div>
      <div class="fg">
        <div class="field"><label class="lbl">Email *</label><input class="inp" id="inv-em" type="email" placeholder="transporteur@example.com"/></div>
        <div class="field"><label class="lbl">Note interne</label><input class="inp" id="inv-no" placeholder="Transporteur espagnol…"/></div>
      </div>
      <button class="btn btn--p mt" onclick="sendInv()">✉️ Envoyer l'invitation</button>
    </div>
    <div class="g2">
      <div class="card"><h3 style="margin-bottom:.8rem">📬 En attente (${pending.length})</h3>
        ${pending.length===0?'<p class="muted">Aucune</p>':
        pending.map(i=>`<div style="padding:.65rem .85rem;background:var(--g10);border-radius:8px;border:1px solid var(--g20);margin-bottom:.45rem"><div style="font-weight:600;color:var(--green);font-size:.88rem">${i.email} <span class="badge role-${i.role}">${i.role}</span></div>${i.note?`<div style="font-size:.76rem;color:var(--sub)">📝 ${i.note}</div>`:''}<div style="font-size:.72rem;color:var(--muted)">${fmtDT(i.created_at)}</div><div class="flex gap-sm mt"><code style="font-size:.68rem;background:var(--cream);padding:.12rem .35rem;border-radius:3px;flex:1;overflow:hidden;text-overflow:ellipsis">${i.token?.slice(0,22)}…</code><button class="btn btn--r btn--sm" onclick="revokeInv('${i.id}')">Révoquer</button></div></div>`).join('')}
      </div>
      <div class="card"><h3 style="margin-bottom:.8rem">✅ Utilisées (${used.length}) · 🚫 Révoquées (${revoked.length})</h3>
        ${[...used,...revoked].length===0?'<p class="muted">Aucun historique</p>':
        [...used,...revoked].sort((a,b)=>b.created_at.localeCompare(a.created_at)).map(i=>`<div style="padding:.55rem .8rem;background:${i.status==='used'?'var(--g10)':'var(--redbg)'};border-radius:7px;border:1px solid ${i.status==='used'?'var(--g20)':'var(--redbrd)'};display:flex;align-items:center;gap:.7rem;margin-bottom:.35rem"><span>${i.status==='used'?'✅':'🚫'}</span><div><div style="font-weight:600;color:var(--green);font-size:.85rem">${i.email} <span class="badge role-${i.role}">${i.role}</span></div><div style="font-size:.72rem;color:var(--muted)">${fmtDT(i.created_at)}</div></div></div>`).join('')}
      </div>
    </div>`;
}
async function sendInv(){const em=document.getElementById('inv-em').value.trim(),no=document.getElementById('inv-no').value.trim(),al=document.getElementById('inv-al');try{const inv=await Auth.createInvitation(em,'transporter',_adm.id,no);await Email.inviteTransporter(em,inv.token,_adm,no);_invites.unshift({...inv,status:'pending'});al.innerHTML=`<div class="al al--s">✅ Invitation envoyée à ${em}</div>`;document.getElementById('inv-em').value='';document.getElementById('inv-no').value='';setTimeout(()=>rInvites(),2000);}catch(e){al.innerHTML=`<div class="al al--e">${e.message}</div>`;}}
async function revokeInv(id){await SB.update('invitations',{id:`eq.${id}`},{status:'revoked'});_invites=_invites.map(i=>i.id===id?{...i,status:'revoked'}:i);rInvites();}

// ── INCIDENTS ──────────────────────────────────────────
function rIncidents(){
  const c=document.getElementById('ac');
  const typeLabels={no_show:'🚫 Non-présentation',late:'⏰ Retard',partial_load:'📦 Charg. incomplet',other:'📝 Autre'};
  c.innerHTML=`
    <h2>Incidents &amp; Pénalités</h2>
    <div class="section-hdr"><h3 style="margin:0">📊 Scores des transporteurs</h3></div>
    <div class="card mb">
      ${_scores.length===0?'<p class="muted tc" style="padding:1.5rem">Aucun incident enregistré</p>':
      `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.85rem">
        <thead><tr style="border-bottom:2px solid var(--border)">
          <th style="text-align:left;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Transporteur</th>
          <th style="text-align:center;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Score</th>
          <th style="text-align:center;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Non-venues</th>
          <th style="text-align:center;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Retards</th>
          <th style="text-align:center;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Total</th>
          <th style="text-align:center;padding:.6rem .8rem;color:var(--muted);font-size:.73rem;text-transform:uppercase">Statut</th>
          <th style="padding:.6rem .8rem"></th>
        </tr></thead>
        <tbody>
          ${_scores.map(s=>`<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:.7rem .8rem"><div style="font-weight:700;color:var(--green)">${s.first_name} ${s.last_name}</div><div style="font-size:.77rem;color:var(--sub)">${s.company}</div></td>
            <td style="text-align:center;padding:.7rem .8rem"><span class="penalty-badge ${s.alert_level}">${s.total_penalty} pt</span></td>
            <td style="text-align:center;padding:.7rem .8rem;font-weight:700;color:${s.no_shows>0?'var(--red)':'var(--text)'}">${s.no_shows}</td>
            <td style="text-align:center;padding:.7rem .8rem;font-weight:700;color:${s.lates>0?'var(--orange)':'var(--text)'}">${s.lates}</td>
            <td style="text-align:center;padding:.7rem .8rem">${s.total_incidents}</td>
            <td style="text-align:center;padding:.7rem .8rem"><span class="badge ${s.status==='active'?'badge--g':s.status==='disabled'?'badge--r':'badge--o'}">${s.status==='active'?'✅':s.status==='disabled'?'🔴':'⏳'}</span></td>
            <td style="padding:.7rem .8rem">${s.alert_level!=='ok'?`<button class="btn btn--r btn--sm" onclick="suspendUser('${s.id}')">Suspendre</button>`:''}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>`}
    </div>
    <div class="section-hdr"><h3 style="margin:0">📋 Historique (${_incidents.length})</h3></div>
    ${_incidents.length===0?`<div class="card tc" style="padding:2rem"><p class="muted">Aucun incident enregistré</p></div>`:
    _incidents.slice(0,30).map(inc=>{
      const user=_users.find(u=>u.id===inc.user_id);
      return`<div class="card card--b mb" style="padding:1rem 1.2rem">
        <div class="flex fxb" style="flex-wrap:wrap;gap:.8rem">
          <div>
            <div class="flex fxc gap-sm mb"><span style="font-size:1.1rem">${inc.type==='no_show'?'🚫':inc.type==='late'?'⏰':inc.type==='partial_load'?'📦':'📝'}</span><strong>${typeLabels[inc.type]||inc.type}</strong>${inc.late_minutes>0?`<span class="badge badge--o">${inc.late_minutes} min</span>`:''}</div>
            <div style="font-size:.84rem;color:var(--sub)">👤 ${user?user.first_name+' '+user.last_name:'—'} — ${user?.company||'—'}</div>
            <div style="font-size:.82rem;color:var(--sub)">📋 ${inc.appointment_id}</div>
            ${inc.note?`<div style="font-size:.8rem;color:var(--sub)">📝 ${inc.note}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <span class="penalty-badge ${inc.penalty>=2?'danger':inc.penalty>=1?'warning':'ok'}">${inc.penalty} pt</span>
            <div style="font-size:.72rem;color:var(--muted);margin-top:.3rem">${fmtDT(inc.created_at)}</div>

    }).join('')}`;
}
async function delInc(id){if(!confirm('Supprimer cet incident ?'))return;await RDV.deleteIncident(id);_incidents=_incidents.filter(i=>i.id!==id);await reload();rIncidents();}

      <div class="card"><h3 class="mb">🏆 Top transporteurs</h3>${topCo.length===0?'<p class="muted">Aucune donnée</p>':topCo.map(([co,count],i)=>`<div style="margin-bottom:.75rem"><div class="flex fxb" style="font-size:.83rem;margin-bottom:.25rem"><span style="color:var(--sub)">${i+1}. ${co}</span><strong style="color:var(--gold)">${count}</strong></div><div style="height:8px;background:var(--cream);border-radius:4px"><div style="height:100%;width:${(count/maxC)*100}%;background:var(--gold);border-radius:4px"></div></div></div>`).join('')}</div>
    </div>
    <div class="card mb"><h3 class="mb">📈 Activité hebdomadaire</h3>
      <div style="display:flex;align-items:flex-end;gap:.5rem;height:90px;padding:0 .5rem">
        ${weekly.map(({label,count})=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem"><span style="font-size:.68rem;color:var(--mid);font-weight:700;min-height:15px">${count>0?count:''}</span><div style="width:100%;background:${count>0?'var(--mid)':'var(--cream)'};border-radius:4px 4px 0 0;height:${Math.max((count/maxW)*65,3)}px"></div><span style="font-size:.66rem;color:var(--muted)">${label}</span></div>`).join('')}
      </div>
    </div>
    <div class="card"><h3 class="mb">⚠️ Incidents par type</h3>
      <div class="g4">

    </div>`;

async function saveSett(){
  await SB.update('settings',{key:'eq.max_trucks_per_day'},{value:document.getElementById('s-tr').value});
  await SB.update('settings',{key:'eq.max_tonnage_per_day'},{value:document.getElementById('s-to').value});
  _sett.maxTrucks=parseInt(document.getElementById('s-tr').value);
  _sett.maxTonnage=parseInt(document.getElementById('s-to').value);
  showAlert(document.getElementById('sal'),'✅ Paramètres sauvegardés !','success');
}
async function savePenSett(){
  const updates=[['penalty_no_show','s-ns'],['penalty_late_30','s-l30'],['penalty_late_60','s-l60'],['penalty_threshold_warning','s-warn'],['penalty_threshold_danger','s-dng']];
  for(const[key,id] of updates) await SB.update('settings',{key:`eq.${key}`},{value:document.getElementById(id).value});
  await reload();
  showAlert(document.getElementById('spal'),'✅ Barème sauvegardé !','success');
}

            <td style="padding:.6rem .8rem"><div style="font-weight:700;color:var(--green);font-size:.88rem">${u?u.first_name+' '+u.last_name:l.email}</div><div style="font-size:.76rem;color:var(--muted)">${l.email}</div></td>
            <td style="padding:.6rem .8rem"><span class="badge role-${l.role}">${l.role}</span></td>
            <td style="padding:.6rem .8rem;text-align:center"><span class="badge ${l.status==='success'?'badge--g':'badge--r'}">${l.status==='success'?'✅ Succès':'❌ Échec'}</span></td>
            <td style="padding:.6rem .8rem;font-size:.79rem;color:var(--sub)">${isMobile?'📱 Mobile':'💻 Desktop'} · ${browser}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}
    </div>`;
}

// ── NOTES ─────────────────────────────────────────────
let _notesUserId=null,_notesUserName='';

async function rNotes(){
  const c=document.getElementById('ac');
  const transporters=_users.filter(u=>u.role==='transporter'||u.role==='driver').sort((a,b)=>a.company.localeCompare(b.company));
  let notesHtml='';
  if(_notesUserId){
    const notes=await SB.select('notes',{user_id:`eq.${_notesUserId}`,select:'*',order:'pinned.desc,created_at.desc'}).catch(()=>[]);
    notesHtml=`<div class="card">
      <div class="section-hdr" style="margin-bottom:1rem">
        <h3 style="margin:0">📝 ${_notesUserName}</h3>
        <button class="btn btn--o btn--sm" onclick="_notesUserId=null;rNotes()">← Retour</button>
      </div>
      <div style="background:var(--g10);border-radius:10px;padding:1rem;margin-bottom:1.2rem;border:1px solid var(--g20)">
        <div class="field" style="margin-bottom:.7rem">
          <textarea class="ta" id="new-note" placeholder="Ajouter une note sur ce transporteur…" style="min-height:80px"></textarea>
        </div>
        <div class="flex gap-sm fxc">
          <label class="flex gap-sm fxc" style="cursor:pointer">
            <input type="checkbox" id="note-pin" style="width:16px;height:16px"/>
            <span style="font-size:.85rem;color:var(--sub)">📌 Épingler</span>
          </label>
          <button class="btn btn--p btn--sm" onclick="addNote('${_notesUserId}')">✚ Ajouter</button>
        </div>
        <div id="note-al" style="margin-top:.5rem"></div>
      </div>
      ${notes.length===0?'<p class="muted tc" style="padding:1.5rem">Aucune note pour ce transporteur</p>':
      notes.map(n=>{
        const author=_users.find(u=>u.id===n.created_by);
        return`<div style="background:${n.pinned?'#fffdf0':'white'};border:1.5px solid ${n.pinned?'#ffe082':'var(--border)'};border-radius:10px;padding:1rem 1.2rem;margin-bottom:.7rem;position:relative">
          ${n.pinned?'<div style="position:absolute;top:.7rem;right:.8rem;font-size:1.1rem">📌</div>':''}
          <p style="color:var(--text);line-height:1.6;font-size:.9rem;margin-bottom:.6rem;white-space:pre-wrap;padding-right:${n.pinned?'1.5rem':'0'}">${n.content}</p>
          <div class="flex fxb fxc" style="flex-wrap:wrap;gap:.5rem">
            <div style="font-size:.76rem;color:var(--muted)">👤 ${author?author.first_name+' '+author.last_name:'Admin'} · ${fmtDT(n.created_at)}</div>
            <div class="flex gap-sm">
              <button class="btn btn--sm" style="background:${n.pinned?'#fff8e6':'var(--g10)'};color:${n.pinned?'var(--orange)':'var(--mid)'};border:1px solid ${n.pinned?'#ffe082':'var(--g20)'}" onclick="togglePin('${n.id}',${!n.pinned})">${n.pinned?'Désépingler':'📌 Épingler'}</button>
              <button class="btn btn--r btn--sm" onclick="deleteNote('${n.id}')">🗑</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }
  c.innerHTML=`
    <h2>📝 Notes sur les transporteurs</h2>
    ${!_notesUserId?`<div class="card">
      <p style="color:var(--sub);font-size:.88rem;margin-bottom:1.2rem">Notes privées visibles uniquement par les administrateurs. Cliquez sur un transporteur pour gérer ses notes.</p>
      <div>${transporters.map(u=>{
        const score=_scores.find(s=>s.id===u.id);
        return`<div class="user-card" style="cursor:pointer" onclick="_notesUserId='${u.id}';_notesUserName='${u.first_name} ${u.last_name} (${u.company})';rNotes()">
          <div class="user-card__avatar" style="background:${u.role==='driver'?'var(--blue)':'var(--mid)'}">${u.role==='driver'?'🚗':'🚛'}</div>
          <div class="user-card__info">
            <div class="user-card__name">${u.first_name} ${u.last_name} <span class="badge role-${u.role}">${u.role}</span>${score?.alert_level==='danger'?'<span class="badge badge--r" style="margin-left:.3rem">⚠️</span>':score?.alert_level==='warning'?'<span class="badge badge--o" style="margin-left:.3rem">🟠</span>':''}</div>
            <div class="user-card__sub">${u.email} · ${u.company}</div>
          </div>
          <span style="color:var(--mid);font-size:1.2rem">→</span>
        </div>`;
      }).join('')}</div>
    </div>`:''}
    ${notesHtml}`;
}

async function addNote(userId){
  const content=document.getElementById('new-note')?.value.trim();
  const pinned=document.getElementById('note-pin')?.checked||false;
  const al=document.getElementById('note-al');
  if(!content){al.innerHTML='<div class="al al--e">La note ne peut pas être vide.</div>';return;}
  try{
    await SB.insert('notes',{user_id:userId,content,pinned,created_by:_adm.id});
    al.innerHTML='<div class="al al--s">✅ Note ajoutée !</div>';
    document.getElementById('new-note').value='';
    document.getElementById('note-pin').checked=false;
    setTimeout(()=>rNotes(),800);
  }catch(e){al.innerHTML=`<div class="al al--e">${e.message}</div>`;}
}
async function togglePin(noteId,pinned){
  await SB.update('notes',{id:`eq.${noteId}`},{pinned,updated_at:new Date().toISOString()});
  rNotes();
}
async function deleteNote(noteId){
  if(!confirm('Supprimer cette note ?'))return;
  await SB.delete('notes',{id:`eq.${noteId}`});
  rNotes();
}

document.addEventListener('DOMContentLoaded',init);
</script>
