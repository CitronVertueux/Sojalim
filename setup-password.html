<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Créer votre mot de passe — Sojalim</title>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body style="background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem">

  <div style="width:100%;max-width:420px">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:2rem">
      <img src="logo.png" alt="Sojalim" style="max-width:260px;width:100%;object-fit:contain"/>
    </div>

    <div class="card" style="padding:2rem">
      <h2 style="margin-bottom:.4rem;font-size:1.4rem">Créer votre mot de passe</h2>
      <p style="color:var(--sub);font-size:.88rem;margin-bottom:1.5rem">Bienvenue chez Sojalim. Choisissez votre mot de passe pour accéder à votre espace.</p>

      <div id="page-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <p style="text-align:center;color:var(--muted);font-size:.78rem;margin-top:1rem">
      Sojalim — Sanders Euralis · 193 Impasse Lautrec, 65500 Vic-en-Bigorre
    </p>
  </div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let _token=null,_userData=null;

async function init(){
  const params=new URLSearchParams(location.search);
  _token=params.get('token');
  const el=document.getElementById('page-content');

  if(!_token){
    el.innerHTML='<div class="al al--e">❌ Lien invalide. Contactez votre administrateur.</div>';return;
  }

  // Vérifie le token
  try{
    const rows=await SB.select('setup_tokens',{
      token:`eq.${_token}`,used:'eq.false',select:'id,user_id,expires_at'
    });
    if(!rows?.length){el.innerHTML='<div class="al al--e">❌ Ce lien a expiré ou a déjà été utilisé.<br><br>Contactez votre administrateur pour en obtenir un nouveau.</div>';return;}
    const tokenData=rows[0];
    if(new Date(tokenData.expires_at)<new Date()){el.innerHTML='<div class="al al--e">❌ Ce lien a expiré (valable 48h).<br><br>Contactez votre administrateur.</div>';return;}

    // Récupère les infos utilisateur
    const uRows=await SB.select('users',{id:`eq.${tokenData.user_id}`,select:'id,email,first_name,last_name,role'});
    _userData={...uRows[0],tokenId:tokenData.id};

    const roleLabel=_userData.role==='manager'?'🏭 Responsable':'👷 Employé';
    el.innerHTML=`
      <div class="al al--s" style="margin-bottom:1.2rem">
        👋 Bonjour <strong>${_userData.first_name} ${_userData.last_name}</strong> !<br>
        <span style="font-size:.82rem">${roleLabel} · ${_userData.email}</span>
      </div>
      <div id="pw-al"></div>
      <div class="fg" style="margin-bottom:1rem">
        <div class="field s2"><label class="lbl">Nouveau mot de passe *</label>
          <input class="inp" type="password" id="pw1" placeholder="8 caractères minimum" oninput="checkStrength()"/>
          <div id="pw-strength" style="margin-top:.3rem;height:4px;background:var(--cream);border-radius:2px;overflow:hidden"><div id="pw-bar" style="height:100%;width:0;border-radius:2px;transition:all .3s"></div></div>
          <div id="pw-txt" style="font-size:.72rem;color:var(--muted);margin-top:.2rem"></div>
        </div>
        <div class="field s2"><label class="lbl">Confirmer le mot de passe *</label>
          <input class="inp" type="password" id="pw2" placeholder="Répétez votre mot de passe"/>
        </div>
      </div>
      <button class="btn btn--p btn--fw" onclick="savePassword()">✅ Créer mon mot de passe et me connecter</button>`;
  }catch(e){el.innerHTML=`<div class="al al--e">Erreur : ${e.message}</div>`;}
}

function checkStrength(){
  const pw=document.getElementById('pw1').value;
  const bar=document.getElementById('pw-bar');
  const txt=document.getElementById('pw-txt');
  let score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^a-zA-Z0-9]/.test(pw))score++;
  const colors=['#e74c3c','#e67e22','#f1c40f','#27ae60','#27ae60'];
  const labels=['Trop court','Faible','Moyen','Fort','Très fort'];
  bar.style.width=(score/5*100)+'%';
  bar.style.background=colors[Math.max(0,score-1)]||'#ccc';
  txt.textContent=pw.length>0?(labels[Math.max(0,score-1)]||''):'';
  txt.style.color=colors[Math.max(0,score-1)]||'var(--muted)';
}

async function savePassword(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  const al=document.getElementById('pw-al');
  if(pw1.length<8){al.innerHTML='<div class="al al--e">Le mot de passe doit faire au moins 8 caractères.</div>';return;}
  if(pw1!==pw2){al.innerHTML='<div class="al al--e">Les mots de passe ne correspondent pas.</div>';return;}

  const btn=document.querySelector('[onclick="savePassword()"]');
  const done=btnLoading(btn,'Enregistrement…');
  try{
    // Hash et met à jour le mot de passe
    const hash=await SB.rpc('hash_password',{password:pw1});
    await SB.update('users',{id:`eq.${_userData.id}`},{password_hash:hash,status:'active'});

    // Marque le token comme utilisé
    await SB.update('setup_tokens',{id:`eq.${_userData.tokenId}`},{used:true});

    // Connecte automatiquement
    const u=await Auth.login(_userData.email,pw1);
    document.getElementById('page-content').innerHTML=`
      <div style="text-align:center;padding:1rem">
        <div style="font-size:3rem;margin-bottom:1rem">✅</div>
        <h3 style="color:var(--green);margin-bottom:.5rem">Mot de passe créé !</h3>
        <p style="color:var(--sub);margin-bottom:1.5rem">Redirection vers votre espace…</p>
        <div class="spinner" style="margin:0 auto"></div>
      </div>`;
    setTimeout(()=>go('staff.html'),1500);
  }catch(e){done();document.getElementById('pw-al').innerHTML=`<div class="al al--e">${e.message}</div>`;}
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
